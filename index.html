<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMB Fitting</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c0f;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2330;
  --border:#1e2d3d;--border2:#243447;
  --text:#e8f4f8;--text2:#8ab4c8;--text3:#4a7a94;
  --cyan:#00d4ff;--cyan2:#00f5ff;--cyan3:#0099bb;--cyan4:#003344;
  --teal:#00b4a0;--teal2:#00d4bc;--teal3:#004d44;
  --accent:#00d4ff;--accent2:#00b4a0;
  --red:#ff4466;--red2:#3d0011;
  --radius:10px;--radius2:14px;
  --font:'Inter',system-ui,sans-serif;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan) 0%,var(--teal) 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#000;letter-spacing:-0.5px;box-shadow:0 0 16px rgba(0,212,255,0.3)}
.logo-text{font-size:16px;font-weight:700;letter-spacing:0.02em;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase;margin-top:1px}
.nav{display:flex;gap:2px}
.nav-btn{background:transparent;border:none;padding:8px 16px;color:var(--text3);font-size:13px;cursor:pointer;border-radius:var(--radius);font-family:var(--font);transition:all 0.15s;font-weight:500}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.active{color:var(--cyan);background:var(--bg3);box-shadow:inset 0 -2px 0 var(--cyan)}
.nav-btn i{margin-right:6px;font-size:14px;vertical-align:-2px}
.session-badge{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase}
.db-status{font-size:11px;padding:4px 10px;border-radius:20px;margin-left:10px;font-weight:500}
.db-status.connected{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.2)}
.db-status.error{background:rgba(255,68,102,0.1);color:var(--red);border:1px solid rgba(255,68,102,0.2)}
.main{flex:1;display:flex;overflow:hidden;height:calc(100vh - 60px)}
.sidebar{width:320px;background:var(--bg2);border-right:1px solid var(--border);padding:24px;flex-shrink:0;overflow-y:auto}
.content{flex:1;overflow-y:auto;padding:28px}
.sidebar-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--cyan3);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sidebar-section{margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--font);transition:all 0.15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--cyan3);background:var(--bg4);box-shadow:0 0 0 3px rgba(0,212,255,0.06)}
.field select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bio-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.bio-section-title span{background:linear-gradient(135deg,var(--cyan),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bio-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.bio-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:16px 18px;transition:border 0.15s;position:relative;overflow:hidden}
.bio-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--teal));opacity:0.4}
.bio-card:focus-within{border-color:var(--cyan3);box-shadow:0 0 0 3px rgba(0,212,255,0.06)}
.bio-card:focus-within::before{opacity:1}
.bio-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.bio-card-name{font-size:12px;font-weight:600;color:var(--text2);line-height:1.4;flex:1}
.bio-card-unit{font-size:10px;color:var(--cyan3);text-transform:uppercase;letter-spacing:0.08em;background:rgba(0,212,255,0.08);padding:2px 7px;border-radius:4px;white-space:nowrap;margin-left:8px}
.bio-card input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--border2);color:var(--cyan2);font-size:22px;font-weight:700;padding:4px 0;font-family:var(--font);transition:border 0.15s;letter-spacing:-0.02em}
.bio-card input:focus{outline:none;border-color:var(--cyan)}
.bio-card input::placeholder{color:var(--text3);font-size:16px;font-weight:400}
.lm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.lm-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px}
.lm-card label{display:block;font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
.lm-card input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-size:18px;font-weight:600;padding:2px 0;font-family:var(--font)}
.lm-card input:focus{outline:none;border-color:var(--cyan3)}
.lm-card input::placeholder{color:var(--border2);font-size:14px;font-weight:400}
.lm-card .lm-unit{font-size:10px;color:var(--text3);margin-top:4px}
.chip-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.chip{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all 0.15s;font-weight:500}
.chip:hover{border-color:var(--cyan3);color:var(--text)}
.chip.selected{background:rgba(0,212,255,0.1);border-color:var(--cyan3);color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,0.15)}
.run-btn{width:100%;background:linear-gradient(135deg,var(--cyan) 0%,var(--teal) 100%);color:#000;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--font);transition:all 0.2s;margin-top:8px;box-shadow:0 4px 20px rgba(0,212,255,0.25)}
.run-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(0,212,255,0.4)}
.run-btn:active{transform:translateY(0)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.clear-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:var(--radius);padding:9px;font-size:12px;cursor:pointer;font-family:var(--font);margin-top:8px;transition:all 0.15s}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.player-banner{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border:1px solid var(--border2);border-top:2px solid var(--cyan3);border-radius:var(--radius2);padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.player-name{font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.player-meta{font-size:13px;color:var(--text2)}
.player-stats{display:flex;gap:28px}
.stat-block{text-align:right}
.stat-val{font-size:24px;font-weight:800;color:var(--cyan);line-height:1;letter-spacing:-0.02em}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.rules-strip{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px}
.rules-strip-title{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--cyan);margin-bottom:10px;font-weight:700}
.rule-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.6}
.rule-item:last-child{margin-bottom:0}
.rule-item i{color:var(--cyan);flex-shrink:0;margin-top:2px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:4px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text3);font-weight:700;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;cursor:default;transition:border 0.15s}
.rec-card.top-pick{border-color:var(--cyan3);background:linear-gradient(135deg,rgba(0,212,255,0.04) 0%,var(--bg2) 100%);box-shadow:0 0 24px rgba(0,212,255,0.06)}
.rec-rank{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rec-rank .cyan-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);flex-shrink:0;box-shadow:0 0 6px var(--cyan)}
.rec-card.top-pick .rec-rank{color:var(--cyan)}
.rec-name{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.3;color:var(--text)}
.rec-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:4px 9px;font-size:11px;color:var(--text2)}
.tag.highlight{background:rgba(0,212,255,0.08);border-color:var(--cyan3);color:var(--cyan)}
.rec-why{font-size:12px;color:var(--text2);line-height:1.7;border-top:1px solid var(--border);padding-top:12px}
.rec-test{font-size:12px;color:var(--teal2);margin-top:10px;display:flex;align-items:flex-start;gap:6px;line-height:1.6}
.rec-test i{flex-shrink:0;margin-top:2px}
.confidence-bar{height:3px;background:var(--border2);border-radius:2px;margin-top:14px;overflow:hidden}
.confidence-fill{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--cyan3),var(--cyan2));box-shadow:0 0 6px var(--cyan)}
.ai-panel{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--teal3);border-radius:var(--radius2);padding:20px;margin-bottom:24px}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--teal2);animation:pulse 2s infinite;box-shadow:0 0 8px var(--teal2)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.ai-title{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal2);font-weight:700}
.ai-text{font-size:13px;color:var(--text2);line-height:1.9}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px;color:var(--text3)}
.empty i{font-size:48px;color:var(--border2)}
.empty-title{font-size:16px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:13px;text-align:center;max-width:300px;line-height:1.7;color:var(--text3)}
.session-list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center}
.session-list-item:hover{border-color:var(--cyan3);background:var(--bg3)}
.session-list-name{font-size:14px;font-weight:600;margin-bottom:4px}
.session-list-meta{font-size:11px;color:var(--text3)}
.admin-lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px}
.admin-lock i{font-size:40px;color:var(--text3)}
.admin-lock-title{font-size:18px;font-weight:700}
.admin-lock-sub{font-size:13px;color:var(--text3)}
.pw-row{display:flex;gap:10px}
.pw-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;color:var(--text);font-size:14px;font-family:var(--font);width:220px}
.pw-row input:focus{outline:none;border-color:var(--cyan3);box-shadow:0 0 0 3px rgba(0,212,255,0.06)}
.pw-btn{background:linear-gradient(135deg,var(--cyan),var(--teal));color:#000;border:none;border-radius:var(--radius);padding:10px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font)}
.pw-err{font-size:12px;color:var(--red)}
.admin-tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.admin-tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 16px;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--font);margin-bottom:-1px;transition:all 0.15s;font-weight:500}
.admin-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.admin-tab:hover{color:var(--text)}
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:14px}
.admin-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.admin-card-meta{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.6}
.admin-card-cond{font-size:11px;color:var(--cyan3);font-family:monospace;background:var(--bg4);padding:4px 10px;border-radius:5px;margin-bottom:10px;display:inline-block;border:1px solid var(--border2)}
.admin-actions{display:flex;gap:8px;margin-top:12px}
.btn-sm{background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:5px 12px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all 0.15s}
.btn-sm:hover{border-color:var(--text2);color:var(--text)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.priority-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-left:8px}
.priority-badge.high{background:rgba(255,68,102,0.12);color:#ff4466;border:1px solid rgba(255,68,102,0.2)}
.priority-badge.medium{background:rgba(255,180,0,0.12);color:#ffb400;border:1px solid rgba(255,180,0,0.2)}
.priority-badge.low{background:rgba(0,212,180,0.12);color:var(--teal2);border:1px solid rgba(0,212,180,0.2)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--font);transition:all 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--cyan3);box-shadow:0 0 0 3px rgba(0,212,255,0.06)}
.form-group textarea{resize:vertical;line-height:1.6}
.form-group select option{background:var(--bg3)}
.form-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.6}
.add-btn{background:linear-gradient(135deg,var(--cyan),var(--teal));color:#000;border:none;border-radius:var(--radius);padding:11px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.add-btn:hover{box-shadow:0 4px 16px rgba(0,212,255,0.3)}
.add-btn:disabled{opacity:0.4;cursor:not-allowed}
.success-msg{font-size:12px;color:var(--teal2);margin-top:10px}
.error-msg{font-size:12px;color:var(--red);margin-top:10px}
.equip-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.equip-row:last-child{border-bottom:none}
.equip-name{font-size:13px;font-weight:600;margin-bottom:5px}
.equip-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.equip-meta{font-size:11px;color:var(--text3)}
.section-divider{display:flex;align-items:center;gap:10px;margin:20px 0 16px}
.section-divider span{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text3);white-space:nowrap;font-weight:700}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity 0.3s;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.toast.success{border-color:var(--teal2);color:var(--teal2)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">
    <div class="logo-mark">EMB</div>
    <div>
      <div class="logo-text">EMB Fitting</div>
      <div class="logo-sub">Club Fitting System</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('fitting')" id="nav-fitting"><i class="ti ti-adjustments-horizontal"></i>Fitting</button>
    <button class="nav-btn" onclick="showPage('sessions')" id="nav-sessions"><i class="ti ti-history"></i>Sessions</button>
    <button class="nav-btn" onclick="showPage('results')" id="nav-results"><i class="ti ti-clipboard-list"></i>Results</button>
    <button class="nav-btn" onclick="showPage('admin')" id="nav-admin"><i class="ti ti-shield-lock"></i>Admin</button>
  </div>
  <div class="header-right">
    <span class="session-badge" id="session-label">No active session</span>
    <span class="db-status connected" id="db-status"><i class="ti ti-database"></i> Connected</span>
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2500);

async function loadAll() {
  try {
    const [r, b, e, s] = await Promise.all([
      db.from('rules').select('*').order('created_at'),
      db.from('bio_correlations').select('*').order('created_at'),
      db.from('equipment').select('*').order('created_at'),
      db.from('sessions').select('*').order('created_at', {ascending:false}),
    ]);
    rulesDB = r.data || [];
    bioCorrelations = b.data || [];
    equipmentDB.drivers = (e.data||[]).filter(x=>x.type==='driver');
    equipmentDB.shafts = (e.data||[]).filter(x=>x.type==='shaft');
    sessionsList = s.data || [];
    document.getElementById('db-status').innerHTML = '<i class="ti ti-database"></i> Connected';
    document.getElementById('db-status').className = 'db-status connected';
    if(rulesDB.length===0) await seedDefaults();
    // Re-render current page so any loaded data is reflected
    showPage(currentPage);
  } catch(err) {
    document.getElementById('db-status').innerHTML = '<i class="ti ti-database-off"></i> Offline';
    document.getElementById('db-status').className = 'db-status error';
  }
}

function setChip(field, value) {
  saveFittingState();
  fittingState[field] = fittingState[field] === value ? '' : value;
  renderFitting();
  restoreFields();
}

function restoreFields() {
  const fields = ['f-name','f-hdcp','f-height','f-wtf','f-gamer','f-swaygap','f-ss','f-bs','f-la','f-sr','f-aa','f-cp','f-smash','f-dl','f-notes'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    if(el && fittingState[id]) el.value = fittingState[id];
  });
  bioFields.forEach(f => {
    const el = document.getElementById('bio-'+f.id);
    if(el && fittingState['bio-'+f.id]) el.value = fittingState['bio-'+f.id];
  });
  const ball = document.getElementById('f-ball');
  if(ball && fittingState['f-ball']) ball.value = fittingState['f-ball'];
}

function saveFittingState() {
  const g = id => { const el=document.getElementById(id); return el?el.value:''; };
  const fields = ['f-name','f-hdcp','f-height','f-wtf','f-gamer','f-swaygap','f-ss','f-bs','f-la','f-sr','f-aa','f-cp','f-smash','f-dl','f-notes','f-ball'];
  fields.forEach(id => { fittingState[id] = g(id); });
  bioFields.forEach(f => { fittingState['bio-'+f.id] = g('bio-'+f.id); });
}

function getFittingData() {
  saveFittingState();
  const g = id => { const el=document.getElementById(id); return el?el.value:''; };
  const d = {
    name:g('f-name'), hdcp:g('f-hdcp'), height:g('f-height'), wtf:g('f-wtf'), gamer:g('f-gamer'),
    grip:fittingState.grip||'', post:fittingState.post||'', shotShape:fittingState.shotShape||'', tempo:fittingState.tempo||'',
    ball:g('f-ball')||'',
    swayGapP7:parseFloat(g('f-swaygap'))||null,
    ss:parseFloat(g('f-ss'))||0, bs:parseFloat(g('f-bs'))||0,
    la:parseFloat(g('f-la'))||0, sr:parseFloat(g('f-sr'))||0,
    aa:parseFloat(g('f-aa'))||0, cp:parseFloat(g('f-cp'))||0,
    smash:parseFloat(g('f-smash'))||0, dl:parseFloat(g('f-dl'))||0,
    notes:g('f-notes'),
  };
  bioFields.forEach(f => { d[f.id] = parseFloat(g('bio-'+f.id))||null; });
  return d;
}

async function runFitting() {
  const data = getFittingData();
  const recs = buildRecommendations(data);
  currentSession = {data, recs};
  document.getElementById('session-label').textContent = data.name || 'Active session';
  aiInsight = '';
  showPage('results');
  const insight = await fetchAI(data, recs);
  await saveSession(data, recs, insight);
}

function buildRecommendations(d) {
  let matchedRules = [], bioMatches = [];
  rulesDB.forEach(rule => {
    let match = false;
    try {
      const expr = rule.condition
        .replace(/swing_speed/g, d.ss).replace(/attack_angle/g, d.aa)
        .replace(/spin_rate/g, d.sr).replace(/launch_angle/g, d.la)
        .replace(/ball_speed/g, d.bs).replace(/sway_gap/g, d.swayGap||0)
        .replace(/chest_lift/g, d.chestLift||0).replace(/lead_elbow/g, d.leadElbow||0)
        .replace(/club_hand_gap/g, d.clubHandGap||0).replace(/pelvis_sway/g, d.pelvisSway||0)
        .replace(/AND/g,'&&').replace(/OR/g,'||');
      match = eval(expr);
    } catch(e){}
    if(match) matchedRules.push(rule);
  });
  bioCorrelations.forEach(c => {
    const val = d[c.bio_var];
    if(val===null||val===undefined) return;
    let match = false;
    try { match = eval(val + ' ' + c.range); } catch(e){}
    if(match) bioMatches.push(c);
  });

  const profileKey = (d.grip && d.post) ? `${d.grip}|${d.post}` : null;
  const profile = profileKey ? GRIP_POST_PROFILES[profileKey] : null;
  let targetWeight = profile?.weight ?? null;
  let targetTip    = profile?.tip    ?? null;
  let targetMid    = profile?.mid    ?? null;
  let targetHandle = profile?.handle ?? null;
  let targetLoft   = profile?.loft   ?? null;

  const sportsboxSignals = [];

  // SWAY GAP BAND LOGIC
  let swayBand = null;
  if(d.swayGap !== null) {
    if(d.swayGap <= -8.5)      { swayBand = 'A'; if(targetLoft!==null) targetLoft -= 0.5; if(targetHandle!==null) targetHandle = Math.min(5, targetHandle+0.4); sportsboxSignals.push({var:'Sway Gap',value:d.swayGap+'"',signal:'Sweep — upward AoA',implication:'Less static loft · low CG · stiffer handle'}); }
    else if(d.swayGap <= -6.4) { swayBand = 'B'; sportsboxSignals.push({var:'Sway Gap',value:d.swayGap+'"',signal:'Mid — balanced AoA',implication:'Standard profile'}); }
    else                        { swayBand = 'C'; if(targetLoft!==null) targetLoft += 0.4; if(targetHandle!==null) targetHandle = Math.max(1, targetHandle-0.3); sportsboxSignals.push({var:'Sway Gap',value:d.swayGap+'"',signal:'Vertical — steeper AoA',implication:'More static loft needed'}); }
  }

  // PELVIS SWAY BAND LOGIC
  if(d.pelvisSway !== null) {
    if(d.pelvisSway >= 6.0)      { if(targetTip!==null) targetTip = Math.max(1, targetTip-0.4); sportsboxSignals.push({var:'Pelvis Sway',value:d.pelvisSway+'"',signal:'High — forward pelvis',implication:'Softer tip profile'}); }
    else if(d.pelvisSway >= 4.5) { sportsboxSignals.push({var:'Pelvis Sway',value:d.pelvisSway+'"',signal:'Normal range',implication:'No adjustment'}); }
    else                          { if(targetWeight!==null) targetWeight += 1.5; sportsboxSignals.push({var:'Pelvis Sway',value:d.pelvisSway+'"',signal:'Low — less forward drive',implication:'Heavier shaft tendency'}); }
  }

  // CHEST LIFT
  if(d.chestLift !== null) {
    if(d.chestLift < -1.6)      { if(targetLoft!==null) targetLoft += 0.5; sportsboxSignals.push({var:'Chest Lift',value:d.chestLift+'"',signal:'Chest dropping',implication:'Add +0.5° loft'}); }
    else if(d.chestLift > 0.5)  { if(targetLoft!==null) targetLoft -= 0.5; sportsboxSignals.push({var:'Chest Lift',value:d.chestLift+'"',signal:'Chest rising — flipping',implication:'Reduce -0.5° loft'}); }
    else                         { sportsboxSignals.push({var:'Chest Lift',value:d.chestLift+'"',signal:'Normal range',implication:'No loft adjustment'}); }
  }

  // LEAD ELBOW
  let elbowHeadSignal = null;
  if(d.leadElbow !== null) {
    if(d.leadElbow > 168)       { elbowHeadSignal='neutral'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Strong face closure',implication:'Neutral head'}); }
    else if(d.leadElbow >= 158) { elbowHeadSignal='neutral'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Moderate face closure',implication:'Neutral head'}); }
    else if(d.leadElbow >= 148) { elbowHeadSignal='draw-bias'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Moderate face open',implication:'Draw-bias head consideration'}); }
    else                         { elbowHeadSignal='draw-bias'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Chicken wing — face open',implication:'Draw-bias head priority'}); }
  }

  // CLUB HAND GAP
  const clubHandGripAvg = d.grip==='Under'?-2:d.grip==='Side On'?0:d.grip==='On Top'?2:null;
  if(d.clubHandGap!==null && clubHandGripAvg!==null && targetTip!==null) {
    const dev = d.clubHandGap - clubHandGripAvg;
    if(dev < -1) {
      const adj = Math.min(Math.abs(dev)*0.25, 0.75);
      targetTip = Math.max(targetTip-adj, 1);
      if(targetHandle!==null) targetHandle = Math.max(targetHandle-adj, 1);
      sportsboxSignals.push({var:'Club Hand Gap',value:d.clubHandGap+'"',signal:`${dev.toFixed(1)}" laid off vs ${d.grip} avg`,implication:'Softer tip & handle'});
    } else if(dev > 1) {
      const adj = Math.min(dev*0.25, 0.75);
      targetTip = Math.min(targetTip+adj, 5);
      if(targetHandle!==null) targetHandle = Math.min(targetHandle+adj, 5);
      sportsboxSignals.push({var:'Club Hand Gap',value:d.clubHandGap+'"',signal:`${dev.toFixed(1)}" across line vs ${d.grip} avg`,implication:'Stiffer tip & handle'});
    } else {
      sportsboxSignals.push({var:'Club Hand Gap',value:d.clubHandGap+'"',signal:'Within norm for grip type',implication:'No adjustment'});
    }
  }

  // PELVIS POST CROSS-CHECK FOR HEAD BIAS
  const pelvisPostAvg = d.post==='Front'?5.4:d.post==='Center'?5.0:d.post==='Rear'?4.5:null;
  let pelvisHeadSignal = null;
  if(d.pelvisSway!==null && pelvisPostAvg!==null) {
    const dev = d.pelvisSway - pelvisPostAvg;
    if(dev > 1) pelvisHeadSignal = 'draw-bias';
    else if(dev < -1) pelvisHeadSignal = 'neutral';
  }

  // HEAD BIAS — corrective
  let headBias = 'neutral';
  if(d.shotShape==='Fade'||d.shotShape==='Both') headBias = 'draw-bias';
  else if(d.shotShape==='Draw') headBias = 'neutral';
  else {
    const allSigs = [elbowHeadSignal, pelvisHeadSignal].filter(Boolean);
    const drawCount = allSigs.filter(s=>s==='draw-bias').length;
    headBias = drawCount > allSigs.length/2 ? 'draw-bias' : 'neutral';
  }

  const torqueTargetMap = {'On Top':2,'Side On':3,'Under':4};
  const targetTorque = d.grip ? torqueTargetMap[d.grip]??null : null;

  // FLEX GATE
  let validFlexes = null;
  if(d.ss > 0) {
    const v = [];
    if(d.ss >= 75 && d.ss < 100) v.push('R');
    if(d.ss >= 85 && d.ss < 110) v.push('S');
    if(d.ss >= 100 && d.ss < 135) v.push('X');
    if(d.ss >= 110) v.push('TX');
    if(v.length) validFlexes = v;
  }

  // SHAFT SCORING
  let scoredShafts = [];
  equipmentDB.shafts.forEach(s => {
    const w  = parseFloat(s.weight)||0;
    const t  = s.tip_val!==null ? parseFloat(s.tip_val) : null;
    const m  = s.mid_val!==null ? parseFloat(s.mid_val) : null;
    const h  = s.handle_val!==null ? parseFloat(s.handle_val) : null;
    const tq = s.torque_val!==null ? parseFloat(s.torque_val) : null;
    if(t===null||m===null||h===null) return;
    if(validFlexes && s.flex && !validFlexes.includes(s.flex)) return;
    let score;
    if(targetWeight===null) { score=99; } else {
      score = Math.abs(w-targetWeight)*0.25 + Math.abs(t-targetTip)*2.0 + Math.abs(m-targetMid)*3.0 + Math.abs(h-targetHandle)*1.5;
      if(targetTorque!==null && tq!==null) score += Math.abs(tq-targetTorque)*1.0;
    }
    scoredShafts.push({name:s.name,weight:w,flex:s.flex,tip:t,mid:m,handle:h,torqueVal:tq,launch:s.launch,score,notes:s.player_type||'',test_tip:s.test_tip||''});
  });
  scoredShafts.sort((a,b)=>a.score-b.score);
  const topShafts = scoredShafts.slice(0,3);

  // BALL SIGNAL
  const ballData = d.ball ? BALL_DB.find(b=>b.name===d.ball) : null;
  const ballSpinVal = ballData?.spin_val ?? null;
  let ballCGSignal = null, loftAdjustment = 0;
  if(ballSpinVal!==null) {
    if(ballSpinVal>=4) { ballCGSignal='forward'; loftAdjustment=-0.5; }
    else if(ballSpinVal<=2) { ballCGSignal='back'; loftAdjustment=+0.5; }
  }

  // HEAD SELECTION
  let heads = [...equipmentDB.drivers];
  if(d.ss>0) heads = heads.filter(h=>d.ss>=(h.swing_speed_min||0)&&d.ss<=(h.swing_speed_max||999));

  let spinCGFilter = null;
  if(d.sr>0) {
    if(d.sr<=2200) spinCGFilter='back';
    else if(d.sr>=2700) spinCGFilter='forward';
  }

  const cgPriority = spinCGFilter || (swayBand==='A'?'forward':null) || (headBias==='draw-bias'?'draw':null) || 'neutral';

  if(cgPriority==='forward') {
    const fwd = heads.filter(h=>h.cg?.includes('forward')||h.spin==='low');
    heads = [...fwd,...heads.filter(h=>!fwd.includes(h))];
  } else if(cgPriority==='draw') {
    const draw = heads.filter(h=>h.cg?.includes('heel'));
    heads = [...draw,...heads.filter(h=>!draw.includes(h))];
  } else if(cgPriority==='back') {
    const back = heads.filter(h=>h.cg?.includes('back')||h.cg?.includes('high'));
    heads = [...back,...heads.filter(h=>!back.includes(h))];
  }

  const seenBrands=new Set(),varied=[],remainder=[];
  heads.forEach(h=>{
    const brand=h.name.split(' ')[0];
    if(!seenBrands.has(brand)){seenBrands.add(brand);varied.push(h);}
    else remainder.push(h);
  });
  heads=[...varied,...remainder];

  const gripSignals = buildGripSignals(d);

  return {
    heads:heads.slice(0,3), shafts:topShafts,
    matchedRules, bioMatches, gripSignals, sportsboxSignals,
    headBias, swayBand, validFlexes,
    profile, profileKey,
    targetWeight, targetTip, targetMid, targetHandle, targetLoft, targetTorque,
    ballData, ballSpinVal, ballCGSignal, loftAdjustment,
  };
}

function buildGripSignals(d) {
  const signals = [];
  const grip = d.grip, post = d.post;
  if(!grip) return signals;
  if(grip==='On Top') signals.push({source:'Grip profile',signal:'On Top grip',recommendation:'Heavier shaft (avg 71g). Stiff tip (4.33 avg) and stiff handle (4.27 avg). Strong tip stiffness priority.',detail:'Tour data: On Top players average 71.1g, tip value 4.33, handle value 4.27.'});
  if(grip==='Under') signals.push({source:'Grip profile',signal:'Under grip',recommendation:'Lighter shaft (avg 69g). Softer tip profile (3.86 avg) and softer handle (3.75 avg) vs On Top.',detail:'Tour data: Under players average 68.7g, tip value 3.86, handle value 3.75.'});
  if(grip==='Side On') signals.push({source:'Grip profile',signal:'Side On grip',recommendation:'Heavier shaft (avg 71g) but softer mid section (3.75 avg). Watch mid stiffness carefully.',detail:'Tour data: Side On players average 71.4g but mid stiffness drops to 3.75.'});
  if(grip==='On Top'&&post==='Front') signals.push({source:'Grip + Post',signal:'On Top / Front',recommendation:'Heaviest shaft profile of any combination (avg 78g). All tour players in this category are faders.',detail:'Burns, Finau, Fleetwood pattern.'});
  if(grip==='On Top'&&post==='Rear') signals.push({source:'Grip + Post',signal:'On Top / Rear',recommendation:'Maximum tip AND handle stiffness (5.0 avg both). Ultra-stiff throughout.',detail:'Stiffest profile in dataset. Spieth, Koepka, Woodland pattern.'});
  if(grip==='Under'&&post==='Front') signals.push({source:'Grip + Post',signal:'Under / Front',recommendation:'Softest tip of any combination (2.0 avg). Mid firm (4.0). Hatton pattern.',detail:'Under / Front is the softest tip combination in the entire dataset.'});
  if(grip==='Under'&&post==='Center') signals.push({source:'Grip + Post',signal:'Under / Center',recommendation:'Softest handle section (3.25 avg). Mid firm (4.0). Most common tour combination.',detail:'Most represented combination: Colin M, JT, Rahm, Cantlay, DJ, Adam Scott.'});
  if(grip==='Under'&&d.shotShape==='Fade') signals.push({source:'Grip + Shot shape',signal:'Under grip fader',recommendation:'Uncommon combination — verify path and face data. May benefit from draw-bias head to neutralise.',detail:'Under grip faders in tour data include Rahm, JT, Hatton.'});
  if(grip==='On Top'&&d.shotShape==='Draw') signals.push({source:'Grip + Shot shape',signal:'On Top grip drawer',recommendation:'Strong in-to-out path likely. Shaft stability important to manage timing. Neutral to back CG.',detail:'On Top drawers (Aberg, Cam Young) use stiff tip profiles.'});
  return signals;
}

async function saveSession(d, recs, insight) {
  const row = {
    player_name:d.name||null, handicap:d.hdcp||null, height:d.height||null, wrist_to_floor:d.wtf||null,
    current_gamer:d.gamer||null, swing_speed:d.ss||null, ball_speed:d.bs||null,

    smash_factor:d.smash||null, dynamic_loft:d.dl||null,
    sway_gap:d.swayGap??null, chest_lift:d.chestLift??null, lead_elbow:d.leadElbow??null,
    club_hand_gap:d.clubHandGap??null, pelvis_sway:d.pelvisSway??null,
    notes:d.notes||null, ai_insight:insight||null,
    recommendations:JSON.stringify({
      heads:recs.heads.map(h=>h.name), shafts:recs.shafts.map(s=>s.name),
      swayBand:recs.swayBand, validFlexes:recs.validFlexes,
    }),
  };
  const {error} = await db.from('sessions').insert(row);

  } else { toast('Could not save session','error'); }
}

async function fetchAI(d, recs) {
  const prompt = `You are an expert golf club fitter at EMB Fitting. Provide 4-5 sentences of specific, actionable fitting insight. Be direct and professional — this displays on screen to the client.
Player: ${d.name||'unnamed'}, Handicap: ${d.hdcp||'unknown'}, Gamer: ${d.gamer||'unknown'}
Swing: Grip ${d.grip||'—'}, Post ${d.post||'—'}, Shot shape ${d.shotShape||'—'}, Tempo ${d.tempo||'—'}
Speed: ${d.ss}mph | Spin: ${d.sr}rpm | AoA: ${d.aa}° | Launch: ${d.la}°
SportsBox: Sway Gap ${d.swayGap??'—'}" (Band ${recs.swayBand||'—'}), Chest Lift ${d.chestLift??'—'}", Lead Elbow ${d.leadElbow??'—'}°, Club/Hand ${d.clubHandGap??'—'}", Pelvis ${d.pelvisSway??'—'}"
Engine: Head bias ${recs.headBias}, Valid flex ${recs.validFlexes?.join('/')||'—'}, Target loft ${recs.targetLoft?.toFixed(1)||'—'}°
Target shaft: ${recs.targetWeight?.toFixed(0)||'—'}g, Tip ${recs.targetTip?.toFixed(1)||'—'}, Mid ${recs.targetMid?.toFixed(1)||'—'}, Handle ${recs.targetHandle?.toFixed(1)||'—'}
Top head: ${recs.heads[0]?.name||'TBD'} | Top shaft: ${recs.shafts[0]?.name||'TBD'}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    aiInsight = data.content?.[0]?.text || 'Analysis unavailable.';
  } catch(e) { aiInsight = 'AI analysis unavailable.'; }
  const el = document.getElementById('ai-text');
  if(el) el.innerHTML = aiInsight;
  return aiInsight;
}

async function loadSession(id) {
  const session = sessionsList.find(s=>s.id===id);
  if(!session) return;
  const d = {
    name:session.player_name||'', hdcp:session.handicap||'', height:session.height||'', wtf:session.wrist_to_floor||'', gamer:session.current_gamer||'',
    ss:session.swing_speed||0, bs:session.ball_speed||0, la:session.launch_angle||0, sr:session.spin_rate||0,
    aa:session.attack_angle||0, cp:session.club_path||0, smash:session.smash_factor||0, dl:session.dynamic_loft||0,
    notes:session.notes||'', ball:'', grip:'', post:'', shotShape:'', tempo:'',
    swayGap:session.sway_gap??null, chestLift:session.chest_lift??null, leadElbow:session.lead_elbow??null,
    clubHandGap:session.club_hand_gap??null, pelvisSway:session.pelvis_sway??null,
  };
  const recs = buildRecommendations(d);
  currentSession = {data:d, recs};
  aiInsight = session.ai_insight||'';
  document.getElementById('session-label').textContent = d.name||'Loaded session';
  showPage('results');
}

async function deleteSession(id) {
  if(!confirm('Delete this session?')) return;
  const {error} = await db.from('sessions').delete().eq('id', id);
  if(!error) { sessionsList = sessionsList.filter(s=>s.id!==id); toast('Session deleted'); renderSessions(); }
  else toast('Could not delete session','error');
}

      <button class="clear-btn" style="border-color:var(--red);color:var(--red)" data-action="lockAdmin"><i class="ti ti-lock"></i> Lock admin</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Database stats</div>
      <div style="font-size:12px;color:var(--text2);line-height:2">
        <div><span style="color:var(--text3)">Rules </span>${rulesDB.length}</div>
        <div><span style="color:var(--text3)">Bio correlations </span>${bioCorrelations.length}</div>
        <div><span style="color:var(--text3)">Driver heads </span>${equipmentDB.drivers.length}</div>
        <div><span style="color:var(--text3)">Shafts </span>${equipmentDB.shafts.length}</div>
        <div><span style="color:var(--text3)">Sessions </span>${sessionsList.length}</div>
      </div>
    </div>`;
  document.getElementById('content').innerHTML = `
    <div class="admin-tabs">
      <button class="admin-tab ${adminTab==='rules'?'active':''}" data-action="adminTab" data-tab="rules">Fitting rules</button>
      <button class="admin-tab ${adminTab==='bio'?'active':''}" data-action="adminTab" data-tab="bio">Biomechanics</button>
      <button class="admin-tab ${adminTab==='equipment'?'active':''}" data-action="adminTab" data-tab="equipment">Equipment</button>
      <button class="admin-tab ${adminTab==='addRule'?'active':''}" data-action="adminTab" data-tab="addRule">+ Add rule</button>
      <button class="admin-tab ${adminTab==='addBio'?'active':''}" data-action="adminTab" data-tab="addBio">+ Add correlation</button>
      <button class="admin-tab ${adminTab==='addEquip'?'active':''}" data-action="adminTab" data-tab="addEquip">+ Add equipment</button>
    </div>
    <div id="admin-body"></div>`;
  renderAdminBody();
}

function setAdminTab(tab) {
  adminTab=tab;
  document.querySelectorAll('.admin-tab').forEach(el=>{
    const map={'rules':'Fitting rules','bio':'Biomechanics','equipment':'Equipment','addRule':'+ Add rule','addBio':'+ Add correlation','addEquip':'+ Add equipment'};
    el.classList.toggle('active',el.textContent===map[tab]);
  });
  renderAdminBody();
}

function renderAdminBody() {
  const el = document.getElementById('admin-body');
  if(!el) return;
  if(adminTab==='rules') {
    el.innerHTML = rulesDB.length===0?'<div style="color:var(--text3);padding:20px">No rules yet.</div>':
    rulesDB.map(r=>`<div class="admin-card">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">
        <div class="admin-card-title" style="margin-bottom:0">${r.recommendation}</div>
        <span class="priority-badge ${r.priority}">${r.priority}</span>
      </div>
      <div class="admin-card-cond">${r.condition}</div>
      <div class="admin-card-meta">${r.notes||''}</div>
      ${r.test_tip?`<div style="font-size:11px;color:var(--teal2);margin-top:4px"><i class="ti ti-target" style="vertical-align:-2px;margin-right:4px"></i>${r.test_tip}</div>`:''}
      <div class="admin-actions"><button class="btn-sm danger" data-action="deleteRule" data-id="${r.id}"><i class="ti ti-trash"></i> Delete</button></div>
    </div>`).join('');
  } else if(adminTab==='bio') {
    el.innerHTML = bioCorrelations.length===0?'<div style="color:var(--text3);padding:20px">No correlations yet.</div>':
    bioCorrelations.map(c=>`<div class="admin-card">
      <div class="admin-card-title">${bioFields.find(f=>f.id===c.bio_var)?.label||c.bio_var}</div>
      <div class="admin-card-cond">${c.range}</div>
      <div class="admin-card-meta">Shaft: ${c.shaft_profile}<br>Head: ${c.head_profile}<br>${c.notes||''}</div>
      <div class="admin-actions"><button class="btn-sm danger" data-action="deleteBio" data-id="${c.id}"><i class="ti ti-trash"></i> Delete</button></div>
    </div>`).join('');
  } else if(adminTab==='equipment') {
    el.innerHTML = `
      <div class="section-divider"><span>Driver heads (${equipmentDB.drivers.length})</span></div>
      ${equipmentDB.drivers.map(h=>`<div class="equip-row">
        <div style="flex:1"><div class="equip-name">${h.name}</div>
        <div class="equip-tags"><span class="tag">${h.spin} spin</span><span class="tag">${h.launch} launch</span><span class="tag">CG: ${h.cg}</span><span class="tag">${h.forgiveness}</span></div>
        <div class="equip-meta">${h.swing_speed_min}–${h.swing_speed_max>=999?'∞':h.swing_speed_max} mph · ${h.notes||''}</div></div>
        <button class="btn-sm danger" data-action="deleteEquip" data-id="${h.id}" style="margin-left:12px"><i class="ti ti-trash"></i></button>
      </div>`).join('')}
      <div class="section-divider"><span>Shafts (${equipmentDB.shafts.length})</span></div>
      ${equipmentDB.shafts.map(s=>`<div class="equip-row">
        <div style="flex:1"><div class="equip-name">${s.name}</div>
        <div class="equip-tags"><span class="tag">${s.weight}</span><span class="tag">${s.flex}</span><span class="tag">${s.launch} launch</span></div>
        <div class="equip-meta">${s.player_type||''}</div></div>
        <button class="btn-sm danger" data-action="deleteEquip" data-id="${s.id}" style="margin-left:12px"><i class="ti ti-trash"></i></button>
      </div>`).join('')}`;
  } else if(adminTab==='addRule') {
    el.innerHTML = `<div class="admin-card">
      <div style="font-size:14px;font-weight:600;margin-bottom:16px">Add fitting rule</div>
      <div class="form-group"><label>Type</label><select id="r-type"><option value="launch_monitor">Launch monitor</option><option value="biomechanics">Biomechanics</option></select></div>
      <div class="form-group"><label>Condition</label><input id="r-cond" placeholder="e.g. swing_speed > 110 AND spin_rate > 2800" /><div class="form-hint">Variables: swing_speed · attack_angle · spin_rate · launch_angle · ball_speed · sway_gap · chest_lift · lead_elbow · club_hand_gap · pelvis_sway</div></div>
      <div class="form-group"><label>Recommendation</label><input id="r-rec" /></div>
      <div class="form-group"><label>Notes</label><textarea id="r-notes" rows="2"></textarea></div>
      <div class="form-group"><label>Test tip</label><input id="r-tip" /></div>
      <div class="form-group"><label>Priority</label><select id="r-pri"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div>
      <button class="add-btn" id="add-rule-btn" data-action="addRule"><i class="ti ti-plus"></i> Add rule</button>
      <div id="r-msg"></div>
    </div>`;
  } else if(adminTab==='addBio') {
    el.innerHTML = `<div class="admin-card">
      <div style="font-size:14px;font-weight:600;margin-bottom:16px">Add biomechanics correlation</div>
      <div class="form-group"><label>Variable</label><select id="bc-var">${bioFields.map(f=>`<option value="${f.id}">${f.label}</option>`).join('')}</select></div>
      <div class="form-group"><label>Range</label><input id="bc-range" placeholder="e.g. > 2.5" /></div>
      <div class="form-group"><label>Shaft recommendation</label><input id="bc-shaft" /></div>
      <div class="form-group"><label>Head recommendation</label><input id="bc-head" /></div>
      <div class="form-group"><label>Notes</label><textarea id="bc-notes" rows="3"></textarea></div>
      <button class="add-btn" id="add-bio-btn" data-action="addBio"><i class="ti ti-plus"></i> Add correlation</button>
      <div id="bc-msg"></div>
    </div>`;
  } else if(adminTab==='addEquip') {
    el.innerHTML = `<div class="admin-card">
      <div style="font-size:14px;font-weight:600;margin-bottom:16px">Add equipment</div>
      <div class="form-group"><label>Type</label><select id="eq-type" data-action="renderEquipForm" onchange="renderEquipForm()"><option value="driver">Driver head</option><option value="shaft">Shaft</option></select></div>
      <div id="eq-form"></div>
    </div>`;
    renderEquipForm();
  }
}

function renderEquipForm() {
  const type = document.getElementById('eq-type')?.value;
  const el = document.getElementById('eq-form');
  if(!el) return;
  if(type==='driver') {
    el.innerHTML = `
      <div class="form-group"><label>Model name</label><input id="eq-name" /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Spin</label><select id="eq-spin"><option>low</option><option>mid-low</option><option selected>mid</option><option>mid-high</option><option>high</option></select></div>
        <div class="form-group"><label>Launch</label><select id="eq-launch"><option>low</option><option>low-mid</option><option selected>mid</option><option>mid-high</option><option>high</option></select></div>
        <div class="form-group"><label>CG position</label><input id="eq-cg" placeholder="e.g. forward-low" /></div>
        <div class="form-group"><label>Forgiveness</label><select id="eq-forg"><option>low</option><option>mid-low</option><option selected>mid</option><option>high</option><option>max</option></select></div>
        <div class="form-group"><label>Min speed</label><input id="eq-ssmin" type="number" placeholder="0" /></div>
        <div class="form-group"><label>Max speed</label><input id="eq-ssmax" type="number" placeholder="999" /></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="eq-notes" rows="2"></textarea></div>
      <div class="form-group"><label>Test tip</label><input id="eq-tip" /></div>
      <button class="add-btn" data-action="addEquipment" data-type="driver"><i class="ti ti-plus"></i> Add driver head</button>
      <div id="eq-msg"></div>`;
  } else {
    el.innerHTML = `
      <div class="form-group"><label>Shaft name</label><input id="eq-name" /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Weight</label><input id="eq-weight" placeholder="65g" /></div>
        <div class="form-group"><label>Flex</label><select id="eq-flex"><option>L</option><option>A</option><option>R</option><option selected>S</option><option>X</option><option>TX</option></select></div>
        <div class="form-group"><label>Launch</label><select id="eq-slaunch"><option>low</option><option>low-mid</option><option selected>mid</option><option>mid-high</option><option>high</option></select></div>
        <div class="form-group"><label>Spin</label><select id="eq-sspin"><option>low</option><option>mid-low</option><option selected>mid</option><option>mid-high</option></select></div>
        <div class="form-group"><label>Torque</label><input id="eq-torque" type="number" step="0.1" /></div>
        <div class="form-group"><label>Profile</label><input id="eq-profile" /></div>
      </div>
      <div class="form-group"><label>Player type</label><input id="eq-player" /></div>
      <div class="form-group"><label>Test tip</label><input id="eq-tip" /></div>
      <button class="add-btn" data-action="addEquipment" data-type="shaft"><i class="ti ti-plus"></i> Add shaft</button>
      <div id="eq-msg"></div>`;
  }
}

async function addRule() {
  const cond = document.getElementById('r-cond').value.trim();
  const rec = document.getElementById('r-rec').value.trim();
  const msg = document.getElementById('r-msg');
  if(!cond||!rec){msg.className='error-msg';msg.textContent='Condition and recommendation are required.';return;}
  const btn = document.getElementById('add-rule-btn'); btn.disabled=true;
  const {error} = await db.from('rules').insert({club:'driver',type:document.getElementById('r-type').value,condition:cond,recommendation:rec,notes:document.getElementById('r-notes').value.trim(),test_tip:document.getElementById('r-tip').value.trim(),priority:document.getElementById('r-pri').value});
  if(error){msg.className='error-msg';msg.textContent='Error: '+error.message;}
  else{msg.className='success-msg';msg.textContent='Rule saved to database.';await loadAll();toast('Rule added');}
  btn.disabled=false; btn.innerHTML='<i class="ti ti-plus"></i> Add rule';
}

async function addBio() {
  const range = document.getElementById('bc-range').value.trim();
  const shaft = document.getElementById('bc-shaft').value.trim();
  const msg = document.getElementById('bc-msg');
  if(!range||!shaft){msg.className='error-msg';msg.textContent='Range and shaft profile are required.';return;}
  const {error} = await db.from('bio_correlations').insert({bio_var:document.getElementById('bc-var').value,range,shaft_profile:shaft,head_profile:document.getElementById('bc-head').value.trim(),notes:document.getElementById('bc-notes').value.trim()});
  if(error){msg.className='error-msg';msg.textContent='Error: '+error.message;}
  else{msg.className='success-msg';msg.textContent='Correlation saved.';await loadAll();toast('Correlation added');}
}

async function addEquipment(type) {
  const name = document.getElementById('eq-name').value.trim();
  const msg = document.getElementById('eq-msg');
  if(!name){msg.className='error-msg';msg.textContent='Name is required.';return;}
  let row = {type, name};
  if(type==='driver'){row={...row,spin:document.getElementById('eq-spin').value,launch:document.getElementById('eq-launch').value,cg:document.getElementById('eq-cg').value,forgiveness:document.getElementById('eq-forg').value,swing_speed_min:parseFloat(document.getElementById('eq-ssmin').value)||0,swing_speed_max:parseFloat(document.getElementById('eq-ssmax').value)||999,notes:document.getElementById('eq-notes').value.trim(),test_tip:document.getElementById('eq-tip').value.trim()};}
  else{row={...row,weight:document.getElementById('eq-weight').value,flex:document.getElementById('eq-flex').value,launch:document.getElementById('eq-slaunch').value,spin:document.getElementById('eq-sspin').value,torque:document.getElementById('eq-torque').value,profile:document.getElementById('eq-profile').value,player_type:document.getElementById('eq-player').value.trim(),test_tip:document.getElementById('eq-tip').value.trim()};}
  const {error} = await db.from('equipment').insert(row);
  if(error){msg.className='error-msg';msg.textContent='Error: '+error.message;}
  else{msg.className='success-msg';msg.textContent='Equipment saved.';await loadAll();toast('Equipment added');}
}

async function deleteRule(id){if(!confirm('Delete this rule?'))return;await db.from('rules').delete().eq('id',id);await loadAll();renderAdminBody();toast('Rule deleted');}
async function deleteBio(id){if(!confirm('Delete this correlation?'))return;await db.from('bio_correlations').delete().eq('id',id);await loadAll();renderAdminBody();toast('Correlation deleted');}
async function deleteEquip(id){if(!confirm('Remove this equipment?'))return;await db.from('equipment').delete().eq('id',id);await loadAll();renderAdminBody();toast('Equipment removed');}

// EVENT DELEGATION — handles all dynamically injected buttons via data-action attributes
// This avoids CSP issues with onclick= in innerHTML on GitHub Pages
document.addEventListener('click', function(e) {
  var el = e.target;
  // Walk up to find the element with data-action (handles clicks on child <i> icons etc)
  while(el && el !== document.body) {
    var action = el.dataset && el.dataset.action;
    if(action) {
      var field = el.dataset.field;
      var value = el.dataset.value;
      var id    = el.dataset.id;
      var tab   = el.dataset.tab;
      var type  = el.dataset.type;
      if(action === 'chip')          { setChip(field, value); }
      else if(action === 'runFitting')   { runFitting(); }
      else if(action === 'clearFitting') { clearFitting(); }
      else if(action === 'showFitting')  { showPage('fitting'); }
      else if(action === 'lockAdmin')    { adminUnlocked=false; renderAdminLock(); }
      else if(action === 'adminTab')     { setAdminTab(tab); }
      else if(action === 'tryUnlock')    { tryUnlock(); }
      else if(action === 'addRule')      { addRule(); }
      else if(action === 'addBio')       { addBio(); }
      else if(action === 'addEquipment') { addEquipment(type); }
      else if(action === 'loadSession')  { loadSession(id); }
      else if(action === 'deleteSession'){ e.stopPropagation(); deleteSession(id); }
      else if(action === 'deleteRule')   { deleteRule(id); }
      else if(action === 'deleteBio')    { deleteBio(id); }
      else if(action === 'deleteEquip')  { deleteEquip(id); }
      return;
    }
    el = el.parentNode;
  }
});

// Render UI immediately so buttons work even before Supabase responds
showPage('fitting');
// Load database in background
loadAll();
</script>
