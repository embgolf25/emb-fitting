<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMB Fitting</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
  --border:#2a2a2a;--border2:#333;
  --text:#f0f0f0;--text2:#999;--text3:#666;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#8a6d28;
  --accent:#1a6b4a;--accent2:#22a06b;
  --red:#c0392b;--blue:#2980b9;
  --radius:8px;--radius2:12px;
  --font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#000;letter-spacing:-0.5px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:0.02em}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
.nav{display:flex;gap:2px}
.nav-btn{background:transparent;border:none;padding:8px 14px;color:var(--text2);font-size:13px;cursor:pointer;border-radius:var(--radius);font-family:var(--font);transition:all 0.15s}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.active{color:var(--gold);background:var(--bg3)}
.nav-btn i{margin-right:5px;font-size:14px;vertical-align:-2px}
.session-badge{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase}
.db-status{font-size:11px;padding:3px 8px;border-radius:3px;margin-left:10px}
.db-status.connected{background:#0d2b1a;color:var(--accent2)}
.db-status.error{background:#2b0d0d;color:#e74c3c}

.main{flex:1;display:flex;overflow:hidden;height:calc(100vh - 56px)}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);padding:20px;flex-shrink:0;overflow-y:auto}
.content{flex:1;overflow-y:auto;padding:24px}

.sidebar-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-weight:600}
.sidebar-section{margin-bottom:24px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--font);transition:border 0.15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold3)}
.field select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.bio-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.bio-input-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.bio-input-name{font-size:12px;font-weight:500;color:var(--text)}
.bio-input-unit{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.bio-input input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--gold2);font-size:16px;font-weight:500;padding:2px 0;font-family:var(--font)}
.bio-input input:focus{outline:none;border-color:var(--gold)}
.bio-input input::placeholder{color:var(--text3);font-size:13px;font-weight:400}

.run-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:12px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;font-family:var(--font);transition:background 0.15s;margin-top:8px}
.run-btn:hover{background:var(--gold2)}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.clear-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:var(--radius);padding:8px;font-size:12px;cursor:pointer;font-family:var(--font);margin-top:6px;transition:all 0.15s}
.clear-btn:hover{border-color:var(--red);color:var(--red)}

.player-banner{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border:1px solid var(--border2);border-radius:var(--radius2);padding:20px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.player-name{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.player-meta{font-size:12px;color:var(--text2)}
.player-stats{display:flex;gap:24px}
.stat-block{text-align:right}
.stat-val{font-size:20px;font-weight:700;color:var(--gold);line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px}

.rules-strip{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px}
.rules-strip-title{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:8px;font-weight:600}
.rule-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);margin-bottom:5px;line-height:1.5}
.rule-item:last-child{margin-bottom:0}
.rule-item i{color:var(--gold);flex-shrink:0;margin-top:1px}

.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);font-weight:600;white-space:nowrap}
.section-line{flex:1;height:1px;background:var(--border)}

.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;cursor:default}
.rec-card.top-pick{border-color:var(--gold3);background:linear-gradient(135deg,#1a1500 0%,var(--bg2) 100%)}
.rec-rank{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rec-rank .gold-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
.rec-card.top-pick .rec-rank{color:var(--gold)}
.rec-name{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.3}
.rec-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:3px 7px;font-size:10px;color:var(--text2)}
.tag.highlight{background:#1a1500;border-color:var(--gold3);color:var(--gold2)}
.rec-why{font-size:12px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:10px}
.rec-test{font-size:11px;color:var(--accent2);margin-top:8px;display:flex;align-items:flex-start;gap:5px;line-height:1.5}
.rec-test i{flex-shrink:0;margin-top:1px}
.confidence-bar{height:2px;background:var(--border2);border-radius:1px;margin-top:12px}
.confidence-fill{height:2px;border-radius:1px;background:linear-gradient(90deg,var(--gold3),var(--gold2))}

.ai-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;margin-bottom:20px}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.ai-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent2);font-weight:600}
.ai-text{font-size:13px;color:var(--text2);line-height:1.8}

.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:12px;color:var(--text3)}
.empty i{font-size:40px;color:var(--border2)}
.empty-title{font-size:15px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:13px;text-align:center;max-width:300px;line-height:1.6}

.session-list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border 0.15s;display:flex;justify-content:space-between;align-items:center}
.session-list-item:hover{border-color:var(--gold3)}
.session-list-name{font-size:13px;font-weight:500;margin-bottom:3px}
.session-list-meta{font-size:11px;color:var(--text3)}

.admin-lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px}
.admin-lock i{font-size:36px;color:var(--text3)}
.admin-lock-title{font-size:16px;font-weight:600}
.admin-lock-sub{font-size:13px;color:var(--text3)}
.pw-row{display:flex;gap:8px}
.pw-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 14px;color:var(--text);font-size:14px;font-family:var(--font);width:200px}
.pw-row input:focus{outline:none;border-color:var(--gold3)}
.pw-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.pw-err{font-size:12px;color:var(--red)}

.admin-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.admin-tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:9px 14px;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--font);margin-bottom:-1px;transition:all 0.15s}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-tab:hover{color:var(--text)}

.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;margin-bottom:14px}
.admin-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.admin-card-meta{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.5}
.admin-card-cond{font-size:11px;color:var(--gold3);font-family:monospace;background:var(--bg4);padding:4px 8px;border-radius:4px;margin-bottom:8px;display:inline-block}
.admin-actions{display:flex;gap:6px;margin-top:10px}
.btn-sm{background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:5px 10px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all 0.15s}
.btn-sm:hover{border-color:var(--text2);color:var(--text)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.priority-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-left:8px}
.priority-badge.high{background:#2d1a1a;color:#e74c3c}
.priority-badge.medium{background:#2d2a1a;color:#e6a817}
.priority-badge.low{background:#1a2a1a;color:#27ae60}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold3)}
.form-group textarea{resize:vertical;line-height:1.6}
.form-group select option{background:var(--bg3)}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.add-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.add-btn:hover{background:var(--gold2)}
.add-btn:disabled{opacity:0.5;cursor:not-allowed}
.success-msg{font-size:12px;color:var(--accent2);margin-top:8px}
.error-msg{font-size:12px;color:var(--red);margin-top:8px}

.equip-row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.equip-row:last-child{border-bottom:none}
.equip-name{font-size:13px;font-weight:500;margin-bottom:4px}
.equip-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.equip-meta{font-size:11px;color:var(--text3)}

.section-divider{display:flex;align-items:center;gap:10px;margin:18px 0 14px}
.section-divider span{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);white-space:nowrap;font-weight:600}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.toast.success{border-color:var(--accent2);color:var(--accent2)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="logo">
    <div class="logo-mark">EMB</div>
    <div>
      <div class="logo-text">EMB Fitting</div>
      <div class="logo-sub">Club Fitting System</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('fitting')" id="nav-fitting"><i class="ti ti-adjustments-horizontal"></i>Fitting</button>
    <button class="nav-btn" onclick="showPage('sessions')" id="nav-sessions"><i class="ti ti-history"></i>Sessions</button>
    <button class="nav-btn" onclick="showPage('results')" id="nav-results"><i class="ti ti-clipboard-list"></i>Results</button>
    <button class="nav-btn" onclick="showPage('admin')" id="nav-admin"><i class="ti ti-shield-lock"></i>Admin</button>
  </div>
  <div class="header-right">
    <span class="session-badge" id="session-label">No active session</span>
    <span class="db-status connected" id="db-status"><i class="ti ti-database"></i> Connected</span>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── SUPABASE INIT ─────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://dfsuklaobtdpfkorqluq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmc3VrbGFvYnRkcGZrb3JxbHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODA5MTcsImV4cCI6MjA5NzA1NjkxN30.Z9MtgZr0asFMXdnMx65OCQn1tNCeRfaJnz6U0Qy1gEw';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASS = 'emb2024';

const bioFields = [
  {id:'swayGap', label:'Sway Gap at Impact', unit:'inches', col:'sway_gap'},
  {id:'chestLift', label:'Chest Lift Into Impact', unit:'inches', col:'chest_lift'},
  {id:'leadElbow', label:'Lead Elbow Flex at Impact', unit:'degrees', col:'lead_elbow'},
  {id:'clubHandGap', label:'Club Hand Gap at Top', unit:'inches', col:'club_hand_gap'},
  {id:'pelvisSway', label:'Pelvis Sway at Impact', unit:'inches', col:'pelvis_sway'},
];

// In-memory cache loaded from Supabase
let rulesDB = [];
let bioCorrelations = [];
let equipmentDB = { drivers: [], shafts: [] };
let sessionsList = [];

let currentSession = null;
let adminUnlocked = false;
let currentPage = 'fitting';
let adminTab = 'rules';
let aiInsight = '';

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2500);
}

// ── LOAD FROM SUPABASE ────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [r, b, e, s] = await Promise.all([
      db.from('rules').select('*').order('created_at'),
      db.from('bio_correlations').select('*').order('created_at'),
      db.from('equipment').select('*').order('created_at'),
      db.from('sessions').select('*').order('created_at', {ascending:false}),
    ]);
    rulesDB = r.data || [];
    bioCorrelations = b.data || [];
    equipmentDB.drivers = (e.data||[]).filter(x=>x.type==='driver');
    equipmentDB.shafts = (e.data||[]).filter(x=>x.type==='shaft');
    sessionsList = s.data || [];
    document.getElementById('db-status').innerHTML = '<i class="ti ti-database"></i> Connected';
    document.getElementById('db-status').className = 'db-status connected';

    // Seed default data if empty
    if(rulesDB.length===0) await seedDefaults();
  } catch(err) {
    document.getElementById('db-status').innerHTML = '<i class="ti ti-database-off"></i> Offline';
    document.getElementById('db-status').className = 'db-status error';
  }
}

async function seedDefaults() {
  const defaultRules = [
    {club:'driver',type:'launch_monitor',condition:'swing_speed > 105 AND attack_angle < -3',recommendation:'Low spin head (LS/TD) + low-launch shaft',priority:'high',notes:'High speed + steep AoA = excessive spin. Need low/forward CG.',test_tip:'Verify with at least 5 shots. AoA consistency matters.'},
    {club:'driver',type:'launch_monitor',condition:'swing_speed < 85',recommendation:'Max forgiveness head + lightweight shaft (50–55g)',priority:'high',notes:'Slower swingers need launch help and lighter total weight.',test_tip:'Check total driver weight including grip.'},
    {club:'driver',type:'launch_monitor',condition:'spin_rate > 3200',recommendation:'Lower spin head + stiffer tip shaft',priority:'high',notes:'High spin destroys distance regardless of speed.',test_tip:'Isolate whether spin is shaft-driven or head-driven by swapping one at a time.'},
    {club:'driver',type:'launch_monitor',condition:'spin_rate < 1800 AND swing_speed < 100',recommendation:'Higher spin head (back CG) + softer tip shaft',priority:'medium',notes:'Low spin at moderate speed = knuckleball. Need more spin for lift.',test_tip:'Check smash factor — low spin + low smash suggests contact issue not equipment.'},
    {club:'driver',type:'biomechanics',condition:'pelvis_sway > 2.5',recommendation:'Draw-bias head. Check path correlation.',priority:'medium',notes:'Excessive pelvis sway tends to correlate with over-the-top delivery and cut path.',test_tip:'Confirm club path data. If path is out-to-in draw-bias head may help.'},
    {club:'driver',type:'biomechanics',condition:'chest_lift > 1.5',recommendation:'Higher launch shaft. Check dynamic loft.',priority:'medium',notes:'Chest lift into impact often reduces dynamic loft.',test_tip:'Check dynamic loft on launch monitor. Target 2-3° above attack angle.'},
  ];
  const defaultBio = [
    {bio_var:'swayGap',range:'> 1.5',shaft_profile:'Lighter shaft weight (50–60g range)',head_profile:'Higher forgiveness, back CG',notes:'Large sway gap correlates with inconsistent strike pattern.'},
    {bio_var:'leadElbow',range:'> 20',shaft_profile:'Softer tip profile, mid-to-high launch',head_profile:'Neutral to back CG',notes:'Lead elbow bend at impact tends to reduce dynamic loft.'},
    {bio_var:'pelvisSway',range:'> 2',shaft_profile:'Mid kick point, stable butt section',head_profile:'Draw-bias consideration if path confirms',notes:'Pelvis sway often correlates with path issues.'},
  ];
  const defaultEquip = [
    {type:'driver',name:'TaylorMade Qi4D',spin:'mid',launch:'mid',cg:'neutral',forgiveness:'high',swing_speed_min:90,swing_speed_max:108,notes:'Best all-around 2026. Strong forgiveness, consistent across face.',test_tip:'Focus on center contact dispersion.'},
    {type:'driver',name:'TaylorMade Qi4D LS',spin:'low',launch:'low-mid',cg:'forward',forgiveness:'mid',swing_speed_min:105,swing_speed_max:999,notes:'Low spin, workability for fast swingers.',test_tip:'Monitor spin floor — if drops below 1800 rpm move to neutral CG.'},
    {type:'driver',name:'TaylorMade Qi4D Max',spin:'mid-high',launch:'high',cg:'back-high',forgiveness:'max',swing_speed_min:0,swing_speed_max:95,notes:'Max forgiveness and launch.',test_tip:'Check MOI benefit on heel/toe strikes.'},
    {type:'driver',name:'Callaway Quantum Max',spin:'mid',launch:'mid-high',cg:'back',forgiveness:'high',swing_speed_min:85,swing_speed_max:105,notes:'Tri-Force face. Neutral flight, consistent.',test_tip:'Compare total distance vs TM equivalent.'},
    {type:'driver',name:'Callaway Quantum Max D',spin:'mid',launch:'mid',cg:'heel-back',forgiveness:'high',swing_speed_min:80,swing_speed_max:105,notes:'Draw-bias CG.',test_tip:'Watch for overcorrection on strong in-to-out path.'},
    {type:'driver',name:'Ping G440 Max',spin:'mid',launch:'mid-high',cg:'high-back',forgiveness:'max',swing_speed_min:70,swing_speed_max:100,notes:'Highest MOI in Ping lineup.',test_tip:'Test vs Quantum Max D if player has path issues.'},

// ── RECOMMENDATION ENGINE ─────────────────────────────────────────────────────
function buildRecommendations(d) {
  let matchedRules = [];
  let bioMatches = [];

  rulesDB.forEach(rule => {
    let match = false;
    try {
      const expr = rule.condition
        .replace(/swing_speed/g, d.ss)
        .replace(/attack_angle/g, d.aa)
        .replace(/spin_rate/g, d.sr)
        .replace(/launch_angle/g, d.la)
        .replace(/ball_speed/g, d.bs)
        .replace(/sway_gap/g, d.swayGap||0)
        .replace(/chest_lift/g, d.chestLift||0)
        .replace(/lead_elbow/g, d.leadElbow||0)
        .replace(/club_hand_gap/g, d.clubHandGap||0)
        .replace(/pelvis_sway/g, d.pelvisSway||0)
        .replace(/AND/g,'&&').replace(/OR/g,'||');
      match = eval(expr);
    } catch(e){}
    if(match) matchedRules.push(rule);
  });

  bioCorrelations.forEach(c => {
    const val = d[c.bio_var];
    if(val===null||val===undefined) return;
    let match = false;
    try { match = eval(val + ' ' + c.range); } catch(e){}
    if(match) bioMatches.push(c);
  });

  let heads = [...equipmentDB.drivers];
  if(d.ss > 0) heads = heads.filter(h => d.ss >= (h.swing_speed_min||0) && d.ss <= (h.swing_speed_max||999));
  if(d.sr > 3000) heads = heads.filter(h => h.spin !== 'mid-high');
  if(matchedRules.some(r=>r.recommendation.toLowerCase().includes('draw'))) {
    const drawHead = heads.find(h=>h.cg&&h.cg.includes('heel'));
    if(drawHead) heads = [drawHead, ...heads.filter(h=>h!==drawHead)];
  }

  let shafts = [...equipmentDB.shafts];
  if(d.ss > 110) shafts = shafts.filter(s=>s.flex==='X'||s.launch==='low');
  else if(d.ss > 98) shafts = shafts.filter(s=>s.flex==='S');
  else if(d.ss < 85) shafts = shafts.filter(s=>s.flex==='R'||parseInt(s.weight)<60);
  if(bioMatches.some(b=>b.shaft_profile&&b.shaft_profile.toLowerCase().includes('lighter'))) {
    shafts.sort((a,b)=>parseInt(a.weight)-parseInt(b.weight));
  }

  return { heads:heads.slice(0,3), shafts:shafts.slice(0,3), matchedRules, bioMatches };
}

async function saveSession(d, recs, insight) {
  const row = {
    player_name: d.name||null, handicap: d.hdcp||null,
    height: d.height||null, wrist_to_floor: d.wtf||null,
    current_gamer: d.gamer||null,
    swing_speed: d.ss||null, ball_speed: d.bs||null,
    launch_angle: d.la||null, spin_rate: d.sr||null,
    attack_angle: d.aa||null, club_path: d.cp||null,
    smash_factor: d.smash||null, dynamic_loft: d.dl||null,
    sway_gap: d.swayGap||null, chest_lift: d.chestLift||null,
    lead_elbow: d.leadElbow||null, club_hand_gap: d.clubHandGap||null,
    pelvis_sway: d.pelvisSway||null,
    notes: d.notes||null,
    ai_insight: insight||null,
    recommendations: JSON.stringify({
      heads: recs.heads.map(h=>h.name),
      shafts: recs.shafts.map(s=>s.name),
      matchedRules: recs.matchedRules.map(r=>r.recommendation),
    }),
  };
  const {error} = await db.from('sessions').insert(row);
  if(!error) {
    toast('Session saved to database');
    const {data} = await db.from('sessions').select('*').order('created_at',{ascending:false});
    sessionsList = data||[];
  } else {
    toast('Could not save session', 'error');
  }
}

async function fetchAI(d, recs) {
  const prompt = `You are an expert golf club fitter at EMB Fitting. Analyze this player's data and provide 4-5 sentences of specific, actionable fitting insight. Be direct and professional — this displays on screen to the client.

Player: ${d.name||'unnamed'}, Handicap: ${d.hdcp||'unknown'}, Height: ${d.height||'—'}", WTF: ${d.wtf||'—'}", Current gamer: ${d.gamer||'unknown'}
Launch monitor: ${d.ss} mph swing, ${d.bs} mph ball, ${d.la}° launch, ${d.sr} rpm spin, ${d.aa}° AoA, ${d.cp}° path, smash ${d.smash||'N/A'}, dynamic loft ${d.dl||'N/A'}°
SportsBox: Sway Gap ${d.swayGap||'—'}in, Chest Lift ${d.chestLift||'—'}in, Lead Elbow ${d.leadElbow||'—'}°, Club Hand Gap ${d.clubHandGap||'—'}in, Pelvis Sway ${d.pelvisSway||'—'}in
Signals: ${recs.matchedRules.map(r=>r.recommendation).join('; ')||'none'}
Top head: ${recs.heads[0]?.name||'TBD'} | Top shaft: ${recs.shafts[0]?.name||'TBD'}
Notes: ${d.notes||'none'}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    aiInsight = data.content?.[0]?.text || 'Analysis unavailable.';
  } catch(e) {
    aiInsight = 'AI analysis unavailable. Rule-based recommendations above remain valid.';
  }
  const el = document.getElementById('ai-text');
  if(el) el.innerHTML = aiInsight;
  return aiInsight;
}

      <button class="clear-btn" style="border-color:var(--red);color:var(--red)" onclick="adminUnlocked=false;renderAdminLock()"><i class="ti ti-lock"></i> Lock admin</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Database stats</div>
      <div style="font-size:12px;color:var(--text2);line-height:2">
        <div><span style="color:var(--text3)">Rules </span>${rulesDB.length}</div>
        <div><span style="color:var(--text3)">Bio correlations </span>${bioCorrelations.length}</div>
        <div><span style="color:var(--text3)">Driver heads </span>${equipmentDB.drivers.length}</div>
        <div><span style="color:var(--text3)">Shafts </span>${equipmentDB.shafts.length}</div>
        <div><span style="color:var(--text3)">Sessions </span>${sessionsList.length}</div>
      </div>
    </div>`;

  document.getElementById('content').innerHTML = `
    <div class="admin-tabs">
      <button class="admin-tab ${adminTab==='rules'?'active':''}" onclick="setAdminTab('rules')">Fitting rules</button>
      <button class="admin-tab ${adminTab==='bio'?'active':''}" onclick="setAdminTab('bio')">Biomechanics</button>
      <button class="admin-tab ${adminTab==='equipment'?'active':''}" onclick="setAdminTab('equipment')">Equipment</button>
      <button class="admin-tab ${adminTab==='addRule'?'active':''}" onclick="setAdminTab('addRule')">+ Add rule</button>
      <button class="admin-tab ${adminTab==='addBio'?'active':''}" onclick="setAdminTab('addBio')">+ Add correlation</button>
      <button class="admin-tab ${adminTab==='addEquip'?'active':''}" onclick="setAdminTab('addEquip')">+ Add equipment</button>
    </div>
    <div id="admin-body"></div>`;
  renderAdminBody();
}

function setAdminTab(tab) {
  adminTab=tab;
  document.querySelectorAll('.admin-tab').forEach(el=>{
    const map={'rules':'Fitting rules','bio':'Biomechanics','equipment':'Equipment','addRule':'+ Add rule','addBio':'+ Add correlation','addEquip':'+ Add equipment'};
    el.classList.toggle('active', el.textContent===map[tab]);
  });
  renderAdminBody();
}

function renderAdminBody() {
  const el = document.getElementById('admin-body');
  if(adminTab==='rules') {
    el.innerHTML = rulesDB.length===0?'<div style="color:var(--text3);padding:20px">No rules yet.</div>':
    rulesDB.map((r,i)=>`
      <div class="admin-card">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">
          <div class="admin-card-title" style="margin-bottom:0">${r.recommendation}</div>
          <span class="priority-badge ${r.priority}">${r.priority}</span>
          <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">${r.type==='biomechanics'?'biomech':'launch mon'}</span>
        </div>
        <div class="admin-card-cond">${r.condition}</div>
        <div class="admin-card-meta">${r.notes||''}</div>
        ${r.test_tip?`<div style="font-size:11px;color:var(--accent2);margin-top:4px"><i class="ti ti-target" style="vertical-align:-2px;margin-right:4px"></i>${r.test_tip}</div>`:''}
        <div class="admin-actions"><button class="btn-sm danger" onclick="deleteRule('${r.id}')"><i class="ti ti-trash"></i> Delete</button></div>
      </div>`).join('');
  } else if(adminTab==='bio') {
    el.innerHTML = bioCorrelations.length===0?'<div style="color:var(--text3);padding:20px">No correlations yet.</div>':
    bioCorrelations.map((c,i)=>`
      <div class="admin-card">
        <div class="admin-card-title">${bioFields.find(f=>f.id===c.bio_var)?.label||c.bio_var}</div>
        <div class="admin-card-cond">${c.range}</div>
        <div class="admin-card-meta">Shaft: ${c.shaft_profile}<br>Head: ${c.head_profile}<br>${c.notes||''}</div>
        <div class="admin-actions"><button class="btn-sm danger" onclick="deleteBio('${c.id}')"><i class="ti ti-trash"></i> Delete</button></div>
      </div>`).join('');
  } else if(adminTab==='equipment') {
    el.innerHTML = `
      <div class="section-divider"><span>Driver heads (${equipmentDB.drivers.length})</span></div>
      ${equipmentDB.drivers.map(h=>`
      <div class="equip-row">
        <div style="flex:1">
          <div class="equip-name">${h.name}</div>
          <div class="equip-tags"><span class="tag">${h.spin} spin</span><span class="tag">${h.launch} launch</span><span class="tag">CG: ${h.cg}</span><span class="tag">${h.forgiveness} forgiveness</span></div>
          <div class="equip-meta">${h.swing_speed_min}–${h.swing_speed_max>=999?'∞':h.swing_speed_max} mph · ${h.notes||''}</div>
        </div>
        <button class="btn-sm danger" onclick="deleteEquip('${h.id}')" style="margin-left:12px;flex-shrink:0"><i class="ti ti-trash"></i></button>
      </div>`).join('')}
      <div class="section-divider"><span>Shafts (${equipmentDB.shafts.length})</span></div>
      ${equipmentDB.shafts.map(s=>`
      <div class="equip-row">
        <div style="flex:1">
          <div class="equip-name">${s.name}</div>
          <div class="equip-tags"><span class="tag">${s.weight}</span><span class="tag">Flex ${s.flex}</span><span class="tag">${s.launch} launch</span><span class="tag">Torque ${s.torque}°</span></div>
          <div class="equip-meta">${s.player_type||''}</div>
        </div>
        <button class="btn-sm danger" onclick="deleteEquip('${s.id}')" style="margin-left:12px;flex-shrink:0"><i class="ti ti-trash"></i></button>
      </div>`).join('')}`;
  } else if(adminTab==='addRule') {
    el.innerHTML = `
      <div class="admin-card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px">Add fitting rule</div>
        <div class="form-group"><label>Rule type</label>
          <select id="r-type"><option value="launch_monitor">Launch monitor</option><option value="biomechanics">Biomechanics</option></select>
        </div>
        <div class="form-group"><label>Condition</label>
          <input id="r-cond" placeholder="e.g. swing_speed > 110 AND spin_rate > 2800" />
          <div class="form-hint">Variables: swing_speed · attack_angle · spin_rate · launch_angle · ball_speed · sway_gap · chest_lift · lead_elbow · club_hand_gap · pelvis_sway</div>
        </div>
        <div class="form-group"><label>Recommendation</label><input id="r-rec" placeholder="e.g. Low spin head + X-stiff shaft" /></div>
        <div class="form-group"><label>Notes</label><textarea id="r-notes" rows="2" placeholder="Why this rule applies..."></textarea></div>
        <div class="form-group"><label>Range test tip</label><input id="r-tip" placeholder="What to watch for on the range..." /></div>
        <div class="form-group"><label>Priority</label>
          <select id="r-pri"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        </div>
        <button class="add-btn" id="add-rule-btn" onclick="addRule()"><i class="ti ti-plus"></i> Add rule</button>
        <div id="r-msg"></div>
      </div>`;
  } else if(adminTab==='addBio') {
    el.innerHTML = `
      <div class="admin-card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px">Add biomechanics correlation</div>
        <div class="form-group"><label>SportsBox variable</label>
          <select id="bc-var">${bioFields.map(f=>`<option value="${f.id}">${f.label} (${f.unit})</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>Range trigger</label>
          <input id="bc-range" placeholder="e.g. > 2.5" />
          <div class="form-hint">Use: &gt; 2.5 or &lt; 1.0 (numbers only, no units needed)</div>
        </div>
        <div class="form-group"><label>Shaft profile recommendation</label><input id="bc-shaft" placeholder="e.g. Lighter shaft (50–60g), softer tip" /></div>
        <div class="form-group"><label>Head profile recommendation</label><input id="bc-head" placeholder="e.g. Higher forgiveness, back CG" /></div>
        <div class="form-group"><label>Notes / rationale</label><textarea id="bc-notes" rows="3" placeholder="What does this biomechanical pattern indicate?"></textarea></div>
        <button class="add-btn" id="add-bio-btn" onclick="addBio()"><i class="ti ti-plus"></i> Add correlation</button>
        <div id="bc-msg"></div>
      </div>`;
  } else if(adminTab==='addEquip') {
    el.innerHTML = `
      <div class="admin-card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px">Add equipment</div>
        <div class="form-group"><label>Type</label>
          <select id="eq-type" onchange="renderEquipForm()"><option value="driver">Driver head</option><option value="shaft">Shaft</option></select>
        </div>
        <div id="eq-form"></div>
      </div>`;
    renderEquipForm();
  }
}

function renderEquipForm() {
  const type = document.getElementById('eq-type')?.value;
  const el = document.getElementById('eq-form');
  if(!el) return;
  if(type==='driver') {
    el.innerHTML = `
      <div class="form-group"><label>Model name</label><input id="eq-name" placeholder="e.g. TaylorMade Qi4D LS" /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Spin</label><select id="eq-spin"><option>low</option><option>mid-low</option><option selected>mid</option><option>mid-high</option><option>high</option></select></div>
        <div class="form-group"><label>Launch</label><select id="eq-launch"><option>low</option><option>low-mid</option><option selected>mid</option><option>mid-high</option><option>high</option></select></div>
        <div class="form-group"><label>CG position</label><input id="eq-cg" placeholder="e.g. forward-low" /></div>
        <div class="form-group"><label>Forgiveness</label><select id="eq-forg"><option>low</option><option>mid-low</option><option selected>mid</option><option>high</option><option>max</option></select></div>
        <div class="form-group"><label>Min speed (mph)</label><input id="eq-ssmin" type="number" placeholder="0" /></div>
        <div class="form-group"><label>Max speed (mph)</label><input id="eq-ssmax" type="number" placeholder="999" /></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="eq-notes" rows="2" placeholder="Key characteristics..."></textarea></div>
      <div class="form-group"><label>Range test tip</label><input id="eq-tip" placeholder="What to focus on testing..." /></div>
      <button class="add-btn" onclick="addEquipment('driver')"><i class="ti ti-plus"></i> Add driver head</button>
      <div id="eq-msg"></div>`;
  } else {
    el.innerHTML = `
      <div class="form-group"><label>Shaft name</label><input id="eq-name" placeholder="e.g. Fujikura Ventus Blue 6S" /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Weight</label><input id="eq-weight" placeholder="e.g. 65g" /></div>
        <div class="form-group"><label>Flex</label><select id="eq-flex"><option>L</option><option>A</option><option>R</option><option selected>S</option><option>X</option></select></div>
        <div class="form-group"><label>Launch</label><select id="eq-slaunch"><option>low</option><option>low-mid</option><option selected>mid</option><option>mid-high</option><option>high</option></select></div>
        <div class="form-group"><label>Spin</label><select id="eq-sspin"><option>low</option><option>mid-low</option><option selected>mid</option><option>mid-high</option></select></div>
        <div class="form-group"><label>Torque (°)</label><input id="eq-torque" type="number" step="0.1" placeholder="3.5" /></div>
        <div class="form-group"><label>Kick point profile</label><input id="eq-profile" placeholder="e.g. Mid-tip stiff" /></div>
      </div>
      <div class="form-group"><label>Player type</label><input id="eq-player" placeholder="e.g. 90–105 mph, wants stability" /></div>
      <div class="form-group"><label>Range test tip</label><input id="eq-tip" placeholder="What to watch for..." /></div>
      <button class="add-btn" onclick="addEquipment('shaft')"><i class="ti ti-plus"></i> Add shaft</button>
      <div id="eq-msg"></div>`;
  }
}

// ── ADMIN CRUD ────────────────────────────────────────────────────────────────
async function addRule() {
  const cond = document.getElementById('r-cond').value.trim();
  const rec = document.getElementById('r-rec').value.trim();
  const msg = document.getElementById('r-msg');
  if(!cond||!rec){msg.className='error-msg';msg.textContent='Condition and recommendation are required.';return;}
  const btn = document.getElementById('add-rule-btn');
  btn.disabled=true;btn.textContent='Saving...';
  const {error} = await db.from('rules').insert({
    club:'driver', type:document.getElementById('r-type').value,
    condition:cond, recommendation:rec,
    notes:document.getElementById('r-notes').value.trim(),
    test_tip:document.getElementById('r-tip').value.trim(),
    priority:document.getElementById('r-pri').value,
  });
  if(error){msg.className='error-msg';msg.textContent='Error: '+error.message;}
  else{
    msg.className='success-msg';msg.textContent='Rule saved to database.';
    document.getElementById('r-cond').value='';document.getElementById('r-rec').value='';
    document.getElementById('r-notes').value='';document.getElementById('r-tip').value='';
    await loadAll();
    toast('Rule added');
  }
  btn.disabled=false;btn.innerHTML='<i class="ti ti-plus"></i> Add rule';
}

async function addBio() {
  const range = document.getElementById('bc-range').value.trim();
  const shaft = document.getElementById('bc-shaft').value.trim();
  const msg = document.getElementById('bc-msg');
  if(!range||!shaft){msg.className='error-msg';msg.textContent='Range and shaft profile are required.';return;}
  const btn = document.getElementById('add-bio-btn');
  btn.disabled=true;
  const {error} = await db.from('bio_correlations').insert({
    bio_var:document.getElementById('bc-var').value,
    range, shaft_profile:shaft,
    head_profile:document.getElementById('bc-head').value.trim(),
    notes:document.getElementById('bc-notes').value.trim(),
  });
  if(error){msg.className='error-msg';msg.textContent='Error: '+error.message;}
  else{
    msg.className='success-msg';msg.textContent='Correlation saved.';
    document.getElementById('bc-range').value='';document.getElementById('bc-shaft').value='';
    document.getElementById('bc-head').value='';document.getElementById('bc-notes').value='';
    await loadAll();
    toast('Correlation added');
  }
  btn.disabled=false;
}

async function addEquipment(type) {
  const name = document.getElementById('eq-name').value.trim();
  const msg = document.getElementById('eq-msg');
  if(!name){msg.className='error-msg';msg.textContent='Name is required.';return;}
  let row = {type, name};
  if(type==='driver'){
    row = {...row, spin:document.getElementById('eq-spin').value, launch:document.getElementById('eq-launch').value,
      cg:document.getElementById('eq-cg').value, forgiveness:document.getElementById('eq-forg').value,
      swing_speed_min:parseFloat(document.getElementById('eq-ssmin').value)||0,
      swing_speed_max:parseFloat(document.getElementById('eq-ssmax').value)||999,
      notes:document.getElementById('eq-notes').value.trim(), test_tip:document.getElementById('eq-tip').value.trim()};
  } else {
    row = {...row, weight:document.getElementById('eq-weight').value, flex:document.getElementById('eq-flex').value,
      launch:document.getElementById('eq-slaunch').value, spin:document.getElementById('eq-sspin').value,
      torque:document.getElementById('eq-torque').value, profile:document.getElementById('eq-profile').value,
      player_type:document.getElementById('eq-player').value.trim(), test_tip:document.getElementById('eq-tip').value.trim()};
  }
  const {error} = await db.from('equipment').insert(row);
  if(error){msg.className='error-msg';msg.textContent='Error: '+error.message;}
  else{msg.className='success-msg';msg.textContent='Equipment saved.';await loadAll();toast('Equipment added');}
}

async function deleteRule(id) {
  if(!confirm('Delete this rule?')) return;
  await db.from('rules').delete().eq('id',id);
  await loadAll(); renderAdminBody(); toast('Rule deleted');
}
async function deleteBio(id) {
  if(!confirm('Delete this correlation?')) return;
  await db.from('bio_correlations').delete().eq('id',id);
  await loadAll(); renderAdminBody(); toast('Correlation deleted');
}
async function deleteEquip(id) {
  if(!confirm('Remove this equipment?')) return;
  await db.from('equipment').delete().eq('id',id);
  await loadAll(); renderAdminBody(); toast('Equipment removed');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadAll().then(() => showPage('fitting'));
</script>
</body>
