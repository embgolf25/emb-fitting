<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMB Fitting</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c0f;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2330;
  --border:#1e2d3d;--border2:#243447;
  --text:#e8f4f8;--text2:#8ab4c8;--text3:#4a7a94;
  --cyan:#CC0000;--cyan2:#FF1A1A;--cyan3:#990000;--cyan4:#330000;
  --teal:#AA0000;--teal2:#FF3333;--teal3:#550000;
  --red:#ff4466;
  --radius:10px;--radius2:14px;
  --font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan) 0%,var(--teal) 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#000;letter-spacing:-0.5px;box-shadow:0 0 16px rgba(204,0,0,0.3)}
.logo-text{font-size:16px;font-weight:700;letter-spacing:0.02em;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.15em;text-transform:uppercase;margin-top:1px}
.nav{display:flex;gap:2px}
.nav-btn{background:transparent;border:none;padding:8px 16px;color:var(--text3);font-size:13px;cursor:pointer;border-radius:var(--radius);font-family:var(--font);transition:all 0.15s;font-weight:500}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.active{color:var(--cyan);background:var(--bg3);box-shadow:inset 0 -2px 0 var(--cyan)}
.nav-btn i{margin-right:6px;font-size:14px;vertical-align:-2px}
.session-badge{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase}
.db-status{font-size:11px;padding:4px 10px;border-radius:20px;margin-left:10px;font-weight:500}
.db-status.connected{background:rgba(204,0,0,0.1);color:var(--cyan);border:1px solid rgba(204,0,0,0.2)}
.db-status.error{background:rgba(255,68,102,0.1);color:var(--red);border:1px solid rgba(255,68,102,0.2)}
.main{flex:1;overflow-y:auto;}
.sidebar{background:transparent;padding:0 28px;}
.content{padding:0 28px 40px;}
.sidebar-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--cyan3);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sidebar-section{margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--font);transition:all 0.15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--cyan3);background:var(--bg4);box-shadow:0 0 0 3px rgba(204,0,0,0.06)}
.field select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bio-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.bio-section-title span{background:linear-gradient(135deg,var(--cyan),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bio-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.bio-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:16px 18px;transition:border 0.15s;position:relative;overflow:hidden}
.bio-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--teal));opacity:0.4}
.bio-card:focus-within{border-color:var(--cyan3);box-shadow:0 0 0 3px rgba(204,0,0,0.06)}
.bio-card:focus-within::before{opacity:1}
.bio-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.bio-card-name{font-size:12px;font-weight:600;color:var(--text2);line-height:1.4;flex:1}
.bio-card-unit{font-size:10px;color:var(--cyan3);text-transform:uppercase;letter-spacing:0.08em;background:rgba(204,0,0,0.08);padding:2px 7px;border-radius:4px;white-space:nowrap;margin-left:8px}
.bio-card input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--border2);color:var(--cyan2);font-size:22px;font-weight:700;padding:4px 0;font-family:var(--font);transition:border 0.15s;letter-spacing:-0.02em}
.bio-card input:focus{outline:none;border-color:var(--cyan)}
.bio-card input::placeholder{color:var(--text3);font-size:16px;font-weight:400}
.lm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.lm-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px}
.lm-card label{display:block;font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
.lm-card input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-size:18px;font-weight:600;padding:2px 0;font-family:var(--font)}
.lm-card input:focus{outline:none;border-color:var(--cyan3)}
.lm-card input::placeholder{color:var(--border2);font-size:14px;font-weight:400}
.lm-card .lm-unit{font-size:10px;color:var(--text3);margin-top:4px}
.chip-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all 0.15s;font-weight:500}
.chip:hover{border-color:var(--cyan3);color:var(--text)}
.chip.selected{background:rgba(204,0,0,0.1);border-color:var(--cyan3);color:var(--cyan);box-shadow:0 0 8px rgba(204,0,0,0.15)}
.run-btn{width:100%;background:linear-gradient(135deg,var(--cyan) 0%,var(--teal) 100%);color:#000;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--font);transition:all 0.2s;margin-top:8px;box-shadow:0 4px 20px rgba(204,0,0,0.25)}
.run-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(204,0,0,0.4)}
.run-btn:active{transform:translateY(0)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.clear-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:var(--radius);padding:9px;font-size:12px;cursor:pointer;font-family:var(--font);margin-top:8px;transition:all 0.15s}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.player-banner{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border:1px solid var(--border2);border-top:2px solid var(--cyan3);border-radius:var(--radius2);padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.player-name{font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.player-meta{font-size:13px;color:var(--text2)}
.player-stats{display:flex;gap:28px}
.stat-block{text-align:right}
.stat-val{font-size:24px;font-weight:800;color:var(--cyan);line-height:1;letter-spacing:-0.02em}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.rules-strip{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px}
.rules-strip-title{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--cyan);margin-bottom:10px;font-weight:700}
.rule-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.6}
.rule-item:last-child{margin-bottom:0}
.rule-item i{color:var(--cyan);flex-shrink:0;margin-top:2px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:4px}
.zone-block{margin-bottom:36px}
.zone-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--border2)}
.zone-header i{font-size:18px;color:var(--cyan)}
.zone-header-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:0.02em}
.zone-header-sub{font-size:11px;color:var(--text3);margin-left:auto}
.analysis-toggle-bar{display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:14px 18px;margin-bottom:0;transition:border 0.15s}
.analysis-toggle-bar:hover{border-color:var(--cyan3)}
.analysis-toggle-left{display:flex;align-items:center;gap:10px}
.analysis-toggle-left i{font-size:16px;color:var(--cyan)}
.analysis-toggle-title{font-size:13px;font-weight:700;color:var(--text)}
.analysis-toggle-chevron{transition:transform 0.2s;color:var(--text3)}
.analysis-toggle-chevron.open{transform:rotate(180deg)}
.analysis-body{overflow:hidden;max-height:0;transition:max-height 0.25s ease}
.analysis-body.open{max-height:3000px}
.analysis-body-inner{padding-top:20px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text3);font-weight:700;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;cursor:default;transition:border 0.15s}
.rec-card.top-pick{border-color:var(--cyan3);background:linear-gradient(135deg,rgba(204,0,0,0.04) 0%,var(--bg2) 100%);box-shadow:0 0 24px rgba(204,0,0,0.06)}
.rec-rank{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rec-rank .cyan-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);flex-shrink:0;box-shadow:0 0 6px var(--cyan)}
.rec-card.top-pick .rec-rank{color:var(--cyan)}
.rec-name{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.3;color:var(--text)}
.rec-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:4px 9px;font-size:11px;color:var(--text2)}
.tag.highlight{background:rgba(204,0,0,0.08);border-color:var(--cyan3);color:var(--cyan)}
.rec-why{font-size:12px;color:var(--text2);line-height:1.7;border-top:1px solid var(--border);padding-top:12px}
.rec-test{font-size:12px;color:var(--teal2);margin-top:10px;display:flex;align-items:flex-start;gap:6px;line-height:1.6}
.confidence-bar{height:3px;background:var(--border2);border-radius:2px;margin-top:14px;overflow:hidden}
.confidence-fill{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--cyan3),var(--cyan2));box-shadow:0 0 6px var(--cyan)}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--teal2);animation:pulse 2s infinite;box-shadow:0 0 8px var(--teal2)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.ai-title{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal2);font-weight:700}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px;color:var(--text3)}
.empty i{font-size:48px;color:var(--border2)}
.empty-title{font-size:16px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:13px;text-align:center;max-width:300px;line-height:1.7;color:var(--text3)}
.session-list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center}
.session-list-item:hover{border-color:var(--cyan3);background:var(--bg3)}
.session-list-name{font-size:14px;font-weight:600;margin-bottom:4px}
.session-list-meta{font-size:11px;color:var(--text3)}
.admin-lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px}
.admin-lock-title{font-size:18px;font-weight:700}
.admin-lock-sub{font-size:13px;color:var(--text3)}
.pw-row{display:flex;gap:10px}
.pw-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;color:var(--text);font-size:14px;font-family:var(--font);width:220px}
.pw-row input:focus{outline:none;border-color:var(--cyan3);box-shadow:0 0 0 3px rgba(204,0,0,0.06)}
.pw-btn{background:linear-gradient(135deg,var(--cyan),var(--teal));color:#000;border:none;border-radius:var(--radius);padding:10px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font)}
.pw-err{font-size:12px;color:var(--red)}
.admin-tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.admin-tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 16px;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--font);margin-bottom:-1px;transition:all 0.15s;font-weight:500}
.admin-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.admin-tab:hover{color:var(--text)}
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:14px}
.admin-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.admin-card-meta{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.6}
.admin-card-cond{font-size:11px;color:var(--cyan3);font-family:monospace;background:var(--bg4);padding:4px 10px;border-radius:5px;margin-bottom:10px;display:inline-block;border:1px solid var(--border2)}
.admin-actions{display:flex;gap:8px;margin-top:12px}
.btn-sm{background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:5px 12px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all 0.15s}
.btn-sm:hover{border-color:var(--text2);color:var(--text)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.priority-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-left:8px}
.priority-badge.high{background:rgba(255,68,102,0.12);color:#ff4466;border:1px solid rgba(255,68,102,0.2)}
.priority-badge.medium{background:rgba(255,180,0,0.12);color:#ffb400;border:1px solid rgba(255,180,0,0.2)}
.priority-badge.low{background:rgba(204,0,0,0.12);color:var(--teal2);border:1px solid rgba(204,0,0,0.2)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--font);transition:all 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--cyan3);box-shadow:0 0 0 3px rgba(204,0,0,0.06)}
.form-group textarea{resize:vertical;line-height:1.6}
.form-group select option{background:var(--bg3)}
.form-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.6}
.add-btn{background:linear-gradient(135deg,var(--cyan),var(--teal));color:#000;border:none;border-radius:var(--radius);padding:11px 22px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.add-btn:hover{box-shadow:0 4px 16px rgba(204,0,0,0.3)}
.add-btn:disabled{opacity:0.4;cursor:not-allowed}
.success-msg{font-size:12px;color:var(--teal2);margin-top:10px}
.error-msg{font-size:12px;color:var(--red);margin-top:10px}
.equip-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.equip-row:last-child{border-bottom:none}
.equip-name{font-size:13px;font-weight:600;margin-bottom:5px}
.equip-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.equip-meta{font-size:11px;color:var(--text3)}
.section-divider{display:flex;align-items:center;gap:10px;margin:20px 0 16px}
.section-divider span{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text3);white-space:nowrap;font-weight:700}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity 0.3s;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.toast.success{border-color:var(--teal2);color:var(--teal2)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">
    <div class="logo-mark">EMB</div>
    <div>
      <div class="logo-text">EMB Fitting</div>
      <div class="logo-sub">Club Fitting System</div>
    </div>
  </div>
  <div class="nav" id="nav"></div>

</div>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>

// Bilinear interpolation across the PING grid. Clamps to chart edges if speed/AoA fall outside range.
function getOptimalLaunchSpin(ballSpeed, aoa) {
  if(ballSpeed==null || aoa==null || isNaN(ballSpeed) || isNaN(aoa)) return null;
  var speeds = OPTIMAL_LAUNCH_SPIN_SPEEDS; // descending: 200..80
  var aoas = OPTIMAL_LAUNCH_SPIN_AOA;      // ascending: -10..10
  var bs = Math.max(speeds[speeds.length-1], Math.min(speeds[0], ballSpeed));
  var ao = Math.max(aoas[0], Math.min(aoas[aoas.length-1], aoa));

  // Find bracketing speeds (speeds descending)
  var s1=speeds[0], s2=speeds[speeds.length-1];
  for(var i=0;i<speeds.length-1;i++){
    if(bs<=speeds[i] && bs>=speeds[i+1]) { s1=speeds[i]; s2=speeds[i+1]; break; }
  }
  // Find bracketing AoA (ascending)
  var a1=aoas[0], a2=aoas[aoas.length-1];
  for(var j=0;j<aoas.length-1;j++){
    if(ao>=aoas[j] && ao<=aoas[j+1]) { a1=aoas[j]; a2=aoas[j+1]; break; }
  }

  var aIdx1 = aoas.indexOf(a1), aIdx2 = aoas.indexOf(a2);
  var Q11 = OPTIMAL_LAUNCH_SPIN_CHART[s1][aIdx1]; // [launch,spin] at s1,a1
  var Q12 = OPTIMAL_LAUNCH_SPIN_CHART[s1][aIdx2]; // s1,a2
  var Q21 = OPTIMAL_LAUNCH_SPIN_CHART[s2][aIdx1]; // s2,a1
  var Q22 = OPTIMAL_LAUNCH_SPIN_CHART[s2][aIdx2]; // s2,a2

  var tS = (s1===s2) ? 0 : (s1-bs)/(s1-s2); // 0 at s1, 1 at s2 (speeds descending)
  var tA = (a1===a2) ? 0 : (ao-a1)/(a2-a1); // 0 at a1, 1 at a2

  function lerp2(v11,v12,v21,v22){
    var top = v11 + (v12-v11)*tA;
    var bot = v21 + (v22-v21)*tA;
    return top + (bot-top)*tS;
  }

  var launch = lerp2(Q11[0],Q12[0],Q21[0],Q22[0]);
  var spin   = lerp2(Q11[1],Q12[1],Q21[1],Q22[1]);
  return {launch:Math.round(launch*10)/10, spin:Math.round(spin)};
}

function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'success');
  setTimeout(function(){ t.className='toast'; }, 2500);
}

function setDBStatus(connected) {
  var s = document.getElementById('db-status');
  s.textContent = connected ? 'Connected' : 'Offline';
  s.className = 'db-status ' + (connected ? 'connected' : 'error');
}

function buildNav() {
  var nav = document.getElementById('nav');
  nav.innerHTML = '';
  var pages = [
    {id:'fitting',   icon:'ti-adjustments-horizontal', label:'Fitting'},
    {id:'sessions',  icon:'ti-history',                label:'Sessions'},
    {id:'results',   icon:'ti-clipboard-list',         label:'Results'},
    {id:'shaftmap',  icon:'ti-chart-grid-dots',        label:'Shaft Map'},
    {id:'admin',     icon:'ti-shield-lock',             label:'Admin'},
  ];
  pages.forEach(function(p) {
    var btn = el('button', 'nav-btn' + (currentPage===p.id ? ' active' : ''));
    btn.innerHTML = '<i class="ti ' + p.icon + '"></i>' + p.label;
    btn.id = 'nav-' + p.id;
    btn.addEventListener('click', function(){ showPage(p.id); });
    nav.appendChild(btn);
  });
}

function showPage(page) {
  currentPage = page;
  buildNav();
  if(page==='fitting')       renderFitting();
  else if(page==='sessions') renderSessions();
  else if(page==='results')  renderResults();
  else if(page==='shaftmap') renderShaftMap();
  else if(page==='admin')    { if(!adminUnlocked) renderAdminLock(); else renderAdmin(); }
}

// ─── LOAD DATA ────────────────────────────────────────────────────────────────

async function loadAll() {
  try {
    var results = await Promise.all([
      db.from('rules').select('*').order('created_at'),
      db.from('bio_correlations').select('*').order('created_at'),
      db.from('equipment').select('*').order('created_at'),
      db.from('sessions').select('*').order('created_at',{ascending:false}),
    ]);
    rulesDB          = results[0].data || [];
    bioCorrelations  = results[1].data || [];
    equipmentDB.drivers = (results[2].data||[]).filter(function(x){return x.type==='driver';});
    equipmentDB.shafts  = (results[2].data||[]).filter(function(x){return x.type==='shaft';});
    sessionsList     = results[3].data || [];
    setDBStatus(true);
    if(rulesDB.length===0) await seedDefaults();
    showPage(currentPage);
  } catch(err) {
    setDBStatus(false);
  }
}

async function seedDefaults() {
  await db.from('rules').insert([
    {club:'driver',type:'launch_monitor',condition:'swing_speed > 105 AND attack_angle < -3',recommendation:'Low spin head (LS/TD) + low-launch shaft',priority:'high',notes:'High speed + steep AoA = excessive spin.',test_tip:'Verify with at least 5 shots.'},
    {club:'driver',type:'launch_monitor',condition:'swing_speed < 85',recommendation:'Max forgiveness head + lightweight shaft (50-55g)',priority:'high',notes:'Slower swingers need launch help.',test_tip:'Check total driver weight including grip.'},
    {club:'driver',type:'launch_monitor',condition:'spin_rate > 3200',recommendation:'Lower spin head + stiffer tip shaft',priority:'high',notes:'High spin destroys distance.',test_tip:'Isolate shaft vs head spin contribution.'},
  ]);
  await db.from('bio_correlations').insert([
    {bio_var:'swayGap',range:'> 1.5',shaft_profile:'Lighter shaft (50-60g)',head_profile:'Higher forgiveness, back CG',notes:'Large sway gap = inconsistent strike.'},
    {bio_var:'leadElbow',range:'> 20',shaft_profile:'Softer tip, mid-to-high launch',head_profile:'Neutral to back CG',notes:'Lead elbow bend reduces dynamic loft.'},
    {bio_var:'pelvisSway',range:'> 2',shaft_profile:'Mid kick, stable butt',head_profile:'Draw-bias if path confirms',notes:'Pelvis sway often correlates with path issues.'},
  ]);
  await loadAll();
}

function setChip(field, value) {
  saveFittingState();
  fittingState[field] = fittingState[field] === value ? '' : value;
  renderFitting();
}

function restoreFields() {
  var textFields = ['f-name','f-hdcp','f-height','f-ss','f-bs','f-la','f-sr','f-aa','f-cp','f-smash','f-dl','f-notes','f-curhead','f-curhead-other','f-curloft'];
  textFields.forEach(function(id){
    var e = document.getElementById(id);
    if(e && fittingState[id] !== undefined) e.value = fittingState[id];
  });
  if(fittingState['f-curhead']==='__other__') {
    var otherEl = document.getElementById('f-curhead-other');
    if(otherEl) otherEl.style.display = '';
  }
  bioFields.forEach(function(f){
    var e = document.getElementById('bio-'+f.id);
    if(e && fittingState['bio-'+f.id] !== undefined) e.value = fittingState['bio-'+f.id];
  });
  var ball = document.getElementById('f-ball');
  if(ball && fittingState['f-ball']) ball.value = fittingState['f-ball'];
}

function saveFittingState() {
  var g = function(id){ var e=document.getElementById(id); return e?e.value:''; };
  ['f-name','f-hdcp','f-height','f-ss','f-bs','f-la','f-sr','f-aa','f-cp','f-smash','f-dl','f-notes','f-ball','f-curhead','f-curhead-other','f-curloft'].forEach(function(id){
    fittingState[id] = g(id);
  });
  bioFields.forEach(function(f){ fittingState['bio-'+f.id] = g('bio-'+f.id); });
}

function getFittingData() {
  saveFittingState();
  var g = function(id){ var e=document.getElementById(id); return e?e.value:''; };
  var d = {
    name:g('f-name'), hdcp:g('f-hdcp'), height:g('f-height'),
    grip:fittingState.grip||'', post:fittingState.post||'', shotShape:fittingState.shotShape||'',
    ball:g('f-ball')||'',
    ss:parseFloat(g('f-ss'))||0, bs:parseFloat(g('f-bs'))||0,
    la:parseFloat(g('f-la'))||0, sr:parseFloat(g('f-sr'))||0,
    aa:parseFloat(g('f-aa'))||0, cp:parseFloat(g('f-cp'))||0,
    smash:parseFloat(g('f-smash'))||0, dl:parseFloat(g('f-dl'))||0,
    notes:g('f-notes'),
    curHead: g('f-curhead')==='__other__' ? (g('f-curhead-other')||'') : (g('f-curhead')||''),
    curLoft: parseFloat(g('f-curloft'))||null,
  };
  bioFields.forEach(function(f){ d[f.id] = parseFloat(g('bio-'+f.id))||null; });
  return d;
}

function clearFitting() {
  fittingState = {grip:'',post:'',shotShape:''};
  currentSession = null;
  document.getElementById('session-label').textContent = 'No active session';
  renderFitting();
}

// ─── RUN FITTING ──────────────────────────────────────────────────────────────

async function runFitting() {
  var data = getFittingData();
  var recs = buildRecommendations(data);
  currentSession = {data:data, recs:recs};
  document.getElementById('session-label').textContent = data.name || 'Active session';
  showPage('results');
  await saveSession(data, recs, '');
}

// ─── ENGINE ───────────────────────────────────────────────────────────────────

function buildRecommendations(d) {
  var matchedRules = [], bioMatches = [];
  rulesDB.forEach(function(rule){
    var match = false;
    try {
      var expr = rule.condition
        .replace(/swing_speed/g,d.ss).replace(/attack_angle/g,d.aa)
        .replace(/spin_rate/g,d.sr).replace(/launch_angle/g,d.la)
        .replace(/ball_speed/g,d.bs).replace(/sway_gap/g,d.swayGap||0)
        .replace(/chest_lift/g,d.chestLift||0).replace(/lead_elbow/g,d.leadElbow||0)
        .replace(/club_hand_gap/g,d.clubHandGap||0).replace(/pelvis_sway/g,d.pelvisSway||0)
        .replace(/AND/g,'&&').replace(/OR/g,'||');
      match = eval(expr);
    } catch(e){}
    if(match) matchedRules.push(rule);
  });
  bioCorrelations.forEach(function(c){
    var val = d[c.bio_var];
    if(val===null||val===undefined) return;
    var match = false;
    try { match = eval(val+' '+c.range); } catch(e){}
    if(match) bioMatches.push(c);
  });

  var profileKey = (d.grip && d.post) ? d.grip+'|'+d.post : null;
  var profile    = profileKey ? GRIP_POST_PROFILES[profileKey] : null;
  var targetWeight = profile ? profile.weight : null;
  var targetTip    = profile ? profile.tip    : null;
  var targetMid    = profile ? profile.mid    : null;
  var targetHandle = profile ? profile.handle : null;
  var targetLoft   = profile ? profile.loft   : null;

  var sportsboxSignals = [];
  var swayBand = null;

  if(d.swayGap !== null) {
    if(d.swayGap <= -8.5)      { swayBand='A'; if(targetLoft!==null)targetLoft-=0.5; if(targetHandle!==null)targetHandle=Math.min(5,targetHandle+0.4); sportsboxSignals.push({var:'Sway Gap',value:d.swayGap+'"',signal:'Sweep — upward AoA',implication:'Less static loft · low CG · stiffer handle'}); }
    else if(d.swayGap <= -6.4) { swayBand='B'; sportsboxSignals.push({var:'Sway Gap',value:d.swayGap+'"',signal:'Mid — balanced AoA',implication:'Standard profile'}); }
    else                        { swayBand='C'; if(targetLoft!==null)targetLoft+=0.4; if(targetHandle!==null)targetHandle=Math.max(1,targetHandle-0.3); sportsboxSignals.push({var:'Sway Gap',value:d.swayGap+'"',signal:'Vertical — steeper AoA',implication:'More static loft needed'}); }
  }
  if(d.pelvisSway !== null) {
    if(d.pelvisSway >= 6.0)      { if(targetTip!==null)targetTip=Math.max(1,targetTip-0.4); sportsboxSignals.push({var:'Pelvis Sway',value:d.pelvisSway+'"',signal:'High — forward pelvis',implication:'Softer tip profile'}); }
    else if(d.pelvisSway >= 4.5) { sportsboxSignals.push({var:'Pelvis Sway',value:d.pelvisSway+'"',signal:'Normal range',implication:'No adjustment'}); }
    else                          { if(targetWeight!==null)targetWeight+=1.5; sportsboxSignals.push({var:'Pelvis Sway',value:d.pelvisSway+'"',signal:'Low — less forward drive',implication:'Heavier shaft tendency'}); }
  }
  if(d.chestLift !== null) {
    if(d.chestLift < -1.6)     { if(targetLoft!==null)targetLoft+=0.5; sportsboxSignals.push({var:'Chest Lift',value:d.chestLift+'"',signal:'Chest dropping',implication:'Add +0.5° loft'}); }
    else if(d.chestLift > 0.5) { if(targetLoft!==null)targetLoft-=0.5; sportsboxSignals.push({var:'Chest Lift',value:d.chestLift+'"',signal:'Chest rising — flipping',implication:'Reduce -0.5° loft'}); }
    else                        { sportsboxSignals.push({var:'Chest Lift',value:d.chestLift+'"',signal:'Normal range',implication:'No loft adjustment'}); }
  }
  var elbowHeadSignal = null;
  if(d.leadElbow !== null) {
    if(d.leadElbow > 168)       { elbowHeadSignal='neutral'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Strong face closure',implication:'Neutral head'}); }
    else if(d.leadElbow >= 158) { elbowHeadSignal='neutral'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Moderate face closure',implication:'Neutral head'}); }
    else if(d.leadElbow >= 148) { elbowHeadSignal='draw-bias'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Moderate face open',implication:'Draw-bias head consideration'}); }
    else                         { elbowHeadSignal='draw-bias'; sportsboxSignals.push({var:'Lead Elbow',value:d.leadElbow+'°',signal:'Chicken wing — face open',implication:'Draw-bias head priority'}); }
  }
  var clubHandGripAvg = d.grip==='Under'?-2:d.grip==='Side On'?0:d.grip==='On Top'?2:null;
  if(d.clubHandGap!==null && clubHandGripAvg!==null && targetTip!==null) {
    var dev = d.clubHandGap - clubHandGripAvg;
    if(dev < -1) {
      var adj = Math.min(Math.abs(dev)*0.25, 0.75);
      targetTip = Math.max(targetTip-adj, 1);
      if(targetHandle!==null) targetHandle = Math.max(targetHandle-adj, 1);
      sportsboxSignals.push({var:'Club Hand Gap',value:d.clubHandGap+'"',signal:dev.toFixed(1)+'" laid off vs '+d.grip+' avg',implication:'Softer tip & handle'});
    } else if(dev > 1) {
      var adj2 = Math.min(dev*0.25, 0.75);
      targetTip = Math.min(targetTip+adj2, 5);
      if(targetHandle!==null) targetHandle = Math.min(targetHandle+adj2, 5);
      sportsboxSignals.push({var:'Club Hand Gap',value:d.clubHandGap+'"',signal:dev.toFixed(1)+'" across line vs '+d.grip+' avg',implication:'Stiffer tip & handle'});
    } else {
      sportsboxSignals.push({var:'Club Hand Gap',value:d.clubHandGap+'"',signal:'Within norm for grip type',implication:'No adjustment'});
    }
  }
  var pelvisPostAvg = d.post==='Front'?5.4:d.post==='Center'?5.0:d.post==='Rear'?4.5:null;
  var pelvisHeadSignal = null;
  if(d.pelvisSway!==null && pelvisPostAvg!==null) {
    var pdev = d.pelvisSway - pelvisPostAvg;
    if(pdev > 1) pelvisHeadSignal = 'draw-bias';
    else if(pdev < -1) pelvisHeadSignal = 'neutral';
  }
  var headBias = 'neutral';
  if(d.shotShape==='Fade'||d.shotShape==='Both') headBias='draw-bias';
  else if(d.shotShape==='Draw') headBias='neutral';
  else {
    var allSigs = [elbowHeadSignal,pelvisHeadSignal].filter(Boolean);
    var drawCount = allSigs.filter(function(s){return s==='draw-bias';}).length;
    headBias = drawCount > allSigs.length/2 ? 'draw-bias' : 'neutral';
  }
  var torqueMap = {'On Top':2,'Side On':3,'Under':4};
  var targetTorque = d.grip ? (torqueMap[d.grip]||null) : null;

  var validFlexes = null;
  if(d.ss > 0) {
    var v = [];
    if(d.ss>=75&&d.ss<100) v.push('R');
    if(d.ss>=85&&d.ss<110) v.push('S');
    if(d.ss>=100&&d.ss<135) v.push('X');
    if(d.ss>=110) v.push('TX');
    if(v.length) validFlexes = v;
  }

  var scoredShafts = [];
  equipmentDB.shafts.forEach(function(s){
    var w  = parseFloat(s.weight)||0;
    var t  = s.tip_val!==null?parseFloat(s.tip_val):null;
    var m  = s.mid_val!==null?parseFloat(s.mid_val):null;
    var h  = s.handle_val!==null?parseFloat(s.handle_val):null;
    var tq = s.torque_val!==null?parseFloat(s.torque_val):null;
    if(t===null||m===null||h===null) return;
    if(validFlexes && s.flex && !validFlexes.includes(s.flex)) return;
    var score;
    if(targetWeight===null) { score=99; } else {
      score = Math.abs(w-targetWeight)*0.25 + Math.abs(t-targetTip)*2.0 + Math.abs(m-targetMid)*3.0 + Math.abs(h-targetHandle)*1.5;
      if(targetTorque!==null&&tq!==null) score += Math.abs(tq-targetTorque)*1.0;
    }
    scoredShafts.push({name:s.name,weight:w,flex:s.flex,tip:t,mid:m,handle:h,torqueVal:tq,launch:s.launch,score:score,notes:s.player_type||'',test_tip:s.test_tip||''});
  });
  scoredShafts.sort(function(a,b){return a.score-b.score;});
  var topShafts = scoredShafts.slice(0,3);

  var ballData = d.ball ? BALL_DB.find(function(b){return b.name===d.ball;}) : null;
  var ballSpinVal = ballData ? ballData.spin_val : null;
  var ballCGSignal = null, loftAdjustment = 0;
  if(ballSpinVal!==null) {
    if(ballSpinVal>=4) { ballCGSignal='forward'; loftAdjustment=-0.5; }
    else if(ballSpinVal<=2) { ballCGSignal='back'; loftAdjustment=+0.5; }
  }
  var launchGapNote = null;
  if(launchGap!==null) {
    if(launchGap <= -1.5) launchGapNote = 'Launching '+Math.abs(launchGap)+'° below optimal for this speed/AoA — more static or dynamic loft would help.';
    else if(launchGap >= 1.5) launchGapNote = 'Launching '+launchGap+'° above optimal for this speed/AoA — less static or dynamic loft would help.';
    else launchGapNote = 'Launch angle is close to optimal for this speed/AoA.';
  }
  var spinGapNote = null;
  if(spinGap!==null) {
    if(spinGap >= 300) spinGapNote = spinGap+' rpm above optimal — forward/low-spin CG bias applied.';
    else if(spinGap <= -300) spinGapNote = Math.abs(spinGap)+' rpm below optimal — back/high-spin CG bias applied.';
    else spinGapNote = 'Spin rate is close to optimal for this speed/AoA.';
  }

  var optimalData = null, spinGap = null, launchGap = null;
  if(d.bs>0 && d.aa!==0) {
    optimalData = getOptimalLaunchSpin(d.bs, d.aa);
    if(optimalData) {
      if(d.sr>0) spinGap = Math.round(d.sr - optimalData.spin);
      if(d.la!==0) launchGap = Math.round((d.la - optimalData.launch)*10)/10;
    }
  }

  var heads = equipmentDB.drivers.slice();
  if(d.ss>0) heads = heads.filter(function(h){return d.ss>=(h.swing_speed_min||0)&&d.ss<=(h.swing_speed_max||999);});
  var spinCGFilter = null;
  if(spinGap!==null) {
    // Gap-based: how far current spin sits from the optimal spin for this player's actual ball speed + AoA
    if(spinGap >= 300) spinCGFilter='forward';       // spinning noticeably more than optimal → lower-spin, forward CG
    else if(spinGap <= -300) spinCGFilter='back';     // spinning noticeably less than optimal → higher-spin, back CG
  } else if(d.sr>0) {
    // Fallback: static thresholds when ball speed or AoA aren't available for a gap calc
    if(d.sr<=2200) spinCGFilter='back'; else if(d.sr>=2700) spinCGFilter='forward';
  }
  var cgPriority = spinCGFilter || (swayBand==='A'?'forward':null) || (headBias==='draw-bias'?'draw':null) || 'neutral';
  if(cgPriority==='forward') { var fwd=heads.filter(function(h){return h.cg&&(h.cg.includes('forward')||h.spin==='low');}); heads=[...fwd,...heads.filter(function(h){return!fwd.includes(h);})]; }
  else if(cgPriority==='draw') { var drw=heads.filter(function(h){return h.cg&&h.cg.includes('heel');}); heads=[...drw,...heads.filter(function(h){return!drw.includes(h);})]; }
  else if(cgPriority==='back') { var bck=heads.filter(function(h){return h.cg&&(h.cg.includes('back')||h.cg.includes('high'));}); heads=[...bck,...heads.filter(function(h){return!bck.includes(h);})]; }
  var seenBrands=new Set(),varied=[],remainder2=[];
  heads.forEach(function(h){ var brand=h.name.split(' ')[0]; if(!seenBrands.has(brand)){seenBrands.add(brand);varied.push(h);}else remainder2.push(h); });
  heads=[...varied,...remainder2];

  var gripSignals = buildGripSignals(d);
  return {heads:heads.slice(0,3),shafts:topShafts,matchedRules:matchedRules,bioMatches:bioMatches,gripSignals:gripSignals,sportsboxSignals:sportsboxSignals,headBias:headBias,swayBand:swayBand,validFlexes:validFlexes,profile:profile,profileKey:profileKey,targetWeight:targetWeight,targetTip:targetTip,targetMid:targetMid,targetHandle:targetHandle,targetLoft:targetLoft,targetTorque:targetTorque,ballData:ballData,ballSpinVal:ballSpinVal,ballCGSignal:ballCGSignal,loftAdjustment:loftAdjustment,optimalData:optimalData,spinGap:spinGap,launchGap:launchGap,spinGapNote:spinGapNote,launchGapNote:launchGapNote,curHead:d.curHead||'',curLoft:d.curLoft||null};
}

function buildGripSignals(d) {
  var signals = [], grip=d.grip, post=d.post;
  if(!grip) return signals;
  if(grip==='On Top')  signals.push({signal:'Profile 1/2/3 (On Top)',recommendation:'Heavier shaft (avg 71g). Stiff tip (4.33 avg) and stiff handle (4.27 avg).'});
  if(grip==='Under')   signals.push({signal:'Profile 7/8/9 (Under)',recommendation:'Lighter shaft (avg 69g). Softer tip (3.86 avg) and handle (3.75 avg).'});
  if(grip==='Side On') signals.push({signal:'Profile 4/5/6 (Side On)',recommendation:'Heavier shaft (avg 71g) but softer mid section (3.75 avg).'});
  if(grip==='On Top'&&post==='Front') signals.push({signal:'Profile 1',recommendation:'Heaviest shaft profile (avg 78g). All tour players in this category are faders.'});
  if(grip==='On Top'&&post==='Rear')  signals.push({signal:'Profile 3',recommendation:'Maximum tip AND handle stiffness (5.0 avg both).'});
  if(grip==='Under'&&post==='Front')  signals.push({signal:'Profile 7',recommendation:'Softest tip of any combination (2.0 avg). Hatton pattern.'});
  if(grip==='Under'&&post==='Center') signals.push({signal:'Profile 8',recommendation:'Softest handle section (3.25 avg). Most common tour combination.'});
  if(grip==='Under'&&d.shotShape==='Fade') signals.push({signal:'Profile 7/8/9 fader',recommendation:'Uncommon — verify path and face data. May need draw-bias head.'});
  if(grip==='On Top'&&d.shotShape==='Draw') signals.push({signal:'Profile 1/2/3 drawer',recommendation:'Strong in-to-out path likely. Shaft stability important.'});
  return signals;
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────

function renderResults() {
  var sidebar  = document.getElementById('sidebar');
  var content  = document.getElementById('content');
  sidebar.innerHTML = '';
  content.innerHTML = '';

  if(!currentSession) {
    var empty = el('div','empty');
    empty.innerHTML = '<i class="ti ti-clipboard-list"></i><div class="empty-title">No active fitting</div><div class="empty-sub">Run a fitting or load a past session to see results here.</div>';
    content.appendChild(empty);
    return;
  }
  var d = currentSession.data, recs = currentSession.recs;

  // Sidebar summary
  var sec = el('div','sidebar-section');
  sec.appendChild(makeSidebarLabel('Session summary'));
  var sumLines = [
    ['Player', d.name||'—'], ['Handicap',d.hdcp||'—'], ['Profile', recs.profileKey?profileName(recs.profileKey):(d.grip&&d.post?d.grip+'/'+d.post:'—')],
    ['Shot shape',d.shotShape||'—'], ['Shot shape',d.shotShape||'—'],
    ['Swing speed',(d.ss||'—')+' mph'],
  ];

  if(recs.swayBand)   sumLines.push(['Sway band',recs.swayBand]);
  if(recs.validFlexes) sumLines.push(['Valid flex',recs.validFlexes.join(' / ')]);
  sumLines.push(['Spin',(d.sr||'—')+' rpm'], ['AoA',(d.aa||'—')+'°']);
  var sumDiv = el('div'); sumDiv.style.cssText='font-size:13px;color:var(--text2);line-height:2';
  sumLines.forEach(function(ln){
    var row = el('div');
    row.innerHTML = '<span style="color:var(--text3)">'+ln[0]+' </span>'+ln[1];
    sumDiv.appendChild(row);
  });
  sec.appendChild(sumDiv);
  sidebar.appendChild(sec);
  if(d.notes){
    var nSec = el('div','sidebar-section');
    nSec.appendChild(makeSidebarLabel('Notes'));
    var nDiv = el('div',null,d.notes); nDiv.style.cssText='font-size:12px;color:var(--text2);line-height:1.7';
    nSec.appendChild(nDiv);
    sidebar.appendChild(nSec);
  }
  var newBtn = el('button','run-btn');
  newBtn.innerHTML='<i class="ti ti-edit"></i> New fitting';
  newBtn.style.marginTop='8px';
  newBtn.addEventListener('click', function(){ showPage('fitting'); });
  sidebar.appendChild(newBtn);

  // Content — use innerHTML for display-only results (no interactive buttons in most of it)
  var html = '<div class="player-banner"><div>';
  html += '<div class="player-name">'+(d.name||'Player')+'</div>';
  html += '<div class="player-meta">'+([recs.profileKey?profileName(recs.profileKey):([d.grip,d.post].filter(Boolean).join('/')),d.shotShape].filter(Boolean).join(' · ')||'—')+(d.hdcp?' · Hdcp '+d.hdcp:'')+'</div>';
  if(recs.swayBand) html += '<div style="font-size:12px;color:var(--cyan3);margin-top:3px">Sway Band '+recs.swayBand+(recs.validFlexes?' · Flex: '+recs.validFlexes.join('/'):'')+( recs.targetLoft?' · Target loft: '+recs.targetLoft.toFixed(1)+'°':'')+'</div>';
  html += '</div><div class="player-stats">';
  if(d.ss) html += '<div class="stat-block"><div class="stat-val">'+d.ss+'</div><div class="stat-lbl">mph</div></div>';
  if(d.sr) html += '<div class="stat-block"><div class="stat-val">'+d.sr+'</div><div class="stat-lbl">rpm</div></div>';
  if(d.aa) html += '<div class="stat-block"><div class="stat-val">'+(d.aa>0?'+':'')+d.aa+'°</div><div class="stat-lbl">AoA</div></div>';
  html += '</div></div>';

  // ── Build Analysis content (signals, SportsBox, target shaft profile, optimal launch/spin) ──
  var analysisHTML = '';
  if(recs.matchedRules.length||recs.bioMatches.length||recs.gripSignals.length) {
    analysisHTML += '<div class="rules-strip"><div class="rules-strip-title">Fitting signals detected</div>';
    recs.matchedRules.forEach(function(r){ analysisHTML += '<div class="rule-item"><i class="ti ti-chevron-right"></i><span><strong style="color:var(--text)">'+r.recommendation+'</strong> — '+r.notes+'</span></div>'; });
    recs.bioMatches.forEach(function(b){ analysisHTML += '<div class="rule-item"><i class="ti ti-activity"></i><span>'+b.shaft_profile+' · '+b.head_profile+'</span></div>'; });
    recs.gripSignals.forEach(function(g){ analysisHTML += '<div class="rule-item"><i class="ti ti-hand-finger"></i><span><strong style="color:var(--cyan2)">'+g.signal+':</strong> '+g.recommendation+'</span></div>'; });
    analysisHTML += '</div>';
  }
  if(recs.sportsboxSignals.length) {
    analysisHTML += '<div class="section-header"><div class="section-title">SportsBox analysis</div><div class="section-line"></div></div>';
    analysisHTML += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
    recs.sportsboxSignals.forEach(function(s){ analysisHTML += '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600;color:var(--cyan3)">'+s.var+'</span><span style="font-size:11px;font-family:monospace;color:var(--cyan2)">'+s.value+'</span></div><div style="font-size:11px;color:var(--text);font-weight:500;margin-bottom:2px">'+s.signal+'</div><div style="font-size:11px;color:var(--text3);line-height:1.5">'+s.implication+'</div></div>'; });
    analysisHTML += '</div>';
    var biasColor = recs.headBias==='draw-bias'?'var(--cyan)':'var(--teal2)';
    analysisHTML += '<div style="background:var(--bg3);border:1px solid var(--border);border-left:3px solid '+biasColor+';border-radius:var(--radius);padding:10px 16px;margin-bottom:20px;font-size:12px"><strong style="color:'+biasColor+'">'+(recs.headBias==='draw-bias'?'Draw-bias head recommended':'Neutral head recommended')+'</strong> — corrective fit</div>';
  }
  if(recs.targetWeight!==null) {
    analysisHTML += '<div style="background:var(--bg3);border:1px solid var(--cyan3);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px">';
    analysisHTML += '<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--cyan);font-weight:700;margin-bottom:8px">Target shaft profile — '+d.grip+' / '+d.post+(recs.swayBand?' · Band '+recs.swayBand:'')+'</div>';
    analysisHTML += '<div style="display:flex;gap:20px;flex-wrap:wrap">';
    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--cyan2)">'+recs.targetWeight.toFixed(0)+'g</div><div style="font-size:10px;color:var(--text3)">Weight</div></div>';
    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--cyan2)">'+(recs.targetTip!==null?recs.targetTip.toFixed(2):'—')+'</div><div style="font-size:10px;color:var(--text3)">Tip</div></div>';
    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--cyan2)">'+(recs.targetMid!==null?recs.targetMid.toFixed(2):'—')+'</div><div style="font-size:10px;color:var(--text3)">Mid</div></div>';
    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--cyan2)">'+(recs.targetHandle!==null?recs.targetHandle.toFixed(2):'—')+'</div><div style="font-size:10px;color:var(--text3)">Handle</div></div>';
    if(recs.targetTorque!==null) analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--teal2)">'+recs.targetTorque+'</div><div style="font-size:10px;color:var(--text3)">Torque</div></div>';

  }

    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--cyan2)">'+recs.optimalData.launch+'°</div><div style="font-size:10px;color:var(--text3)">Optimal launch</div></div>';
    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--text)">'+d.sr+'</div><div style="font-size:10px;color:var(--text3)">Actual spin</div></div>';
    analysisHTML += '<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--cyan2)">'+recs.optimalData.spin+'</div><div style="font-size:10px;color:var(--text3)">Optimal spin</div></div>';
    analysisHTML += '</div>';
    if(recs.launchGapNote) analysisHTML += '<div style="font-size:12px;color:var(--text2);margin-bottom:4px"><i class="ti ti-arrow-up-right" style="color:var(--cyan)"></i> '+recs.launchGapNote+'</div>';
    if(recs.spinGapNote)   analysisHTML += '<div style="font-size:12px;color:var(--text2)"><i class="ti ti-rotate" style="color:var(--cyan)"></i> '+recs.spinGapNote+'</div>';
    analysisHTML += '<div style="font-size:10px;color:var(--text3);margin-top:8px;border-top:1px solid var(--border);padding-top:8px">Optimal values interpolated from PING launch/spin chart for '+d.bs+' mph ball speed and '+(d.aa>0?'+':'')+d.aa+'° AoA.</div>';
    analysisHTML += '</div>';
  }

  // ── Build Recommendations content (driver heads + shafts) ──
  var recsHTML = '';
  if(recs.heads.length) {
    recsHTML += '<div class="section-header"><div class="section-title">Driver heads</div><div class="section-line"></div></div><div class="rec-grid">';
    recs.heads.forEach(function(h,i){
      recsHTML += '<div class="rec-card'+(i===0?' top-pick':'')+'"><div class="rec-rank">'+(i===0?'<div class="cyan-dot"></div>':'')+( i===0?'Top recommendation':'Option '+(i+1))+'</div>';
      recsHTML += '<div class="rec-name">'+h.name+'</div><div class="rec-tags"><span class="tag'+(i===0?' highlight':'')+'">Spin: '+h.spin+'</span><span class="tag">Launch: '+h.launch+'</span><span class="tag">CG: '+h.cg+'</span><span class="tag">'+h.forgiveness+' forgiveness</span></div>';
      recsHTML += '<div class="rec-why">'+h.notes+'</div>';
      if(h.test_tip) recsHTML += '<div class="rec-test"><i class="ti ti-target"></i>'+h.test_tip+'</div>';
      recsHTML += '<div class="confidence-bar"><div class="confidence-fill" style="width:'+(i===0?92:i===1?72:52)+'%"></div></div></div>';
    });
    recsHTML += '</div>';
  }
  if(recs.shafts.length) {
    recsHTML += '<div class="section-header"><div class="section-title">Driver shafts'+(recs.validFlexes?' ('+recs.validFlexes.join('/')+' only)':'')+'</div><div class="section-line"></div></div><div class="rec-grid">';
    recs.shafts.forEach(function(s,i){
      var pct = s.score<1?96:s.score<3?85:s.score<6?70:50;
      recsHTML += '<div class="rec-card'+(i===0?' top-pick':'')+'"><div class="rec-rank">'+(i===0?'<div class="cyan-dot"></div>':'')+( i===0?'Best match':'Match '+(i+1))+'</div>';
      recsHTML += '<div class="rec-name">'+s.name+'</div><div class="rec-tags"><span class="tag'+(i===0?' highlight':'')+'">'+s.weight+'g '+(s.flex||'')+'</span><span class="tag">Tip '+(s.tip!==null?s.tip.toFixed(1):'—')+'</span><span class="tag">Mid '+(s.mid!==null?s.mid.toFixed(1):'—')+'</span><span class="tag">Handle '+(s.handle!==null?s.handle.toFixed(1):'—')+'</span>'+(s.torqueVal!=null?'<span class="tag" style="border-color:var(--teal3);color:var(--teal2)">Torque '+s.torqueVal+'</span>':'')+'</div>';
      if(s.notes) recsHTML += '<div class="rec-why">'+s.notes+'</div>';
      if(s.test_tip) recsHTML += '<div class="rec-test"><i class="ti ti-target"></i>'+s.test_tip+'</div>';
      recsHTML += '<div class="confidence-bar"><div class="confidence-fill" style="width:'+pct+'%"></div></div></div>';
    });
    recsHTML += '</div>';
  }

  // ── Zone 1: Recommendations (front and center) ──
  if(recsHTML) {
    html += '<div class="zone-block"><div class="zone-header"><i class="ti ti-target-arrow"></i><div class="zone-header-title">Recommendations</div><div class="zone-header-sub">Top picks for this player</div></div>'+recsHTML+'</div>';
  }

  // ── Zone 2: Fitting Analysis (collapsible, the "why") ──
  if(analysisHTML) {
    html += '<div class="zone-block">';
    html += '<div class="analysis-toggle-bar" id="analysis-toggle-bar"><div class="analysis-toggle-left"><i class="ti ti-chart-bar"></i><span class="analysis-toggle-title">Fitting Analysis</span></div><i class="ti ti-chevron-down analysis-toggle-chevron" id="analysis-chevron"></i></div>';
    html += '<div class="analysis-body" id="analysis-body"><div class="analysis-body-inner">'+analysisHTML+'</div></div>';
    html += '</div>';
  }

  content.innerHTML = html;

  var toggleBar = document.getElementById('analysis-toggle-bar');
  if(toggleBar) {
    toggleBar.addEventListener('click', function(){
      var body = document.getElementById('analysis-body');
      var chevron = document.getElementById('analysis-chevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    });
  }
}

async function saveSession(d, recs, insight) {
  var row = {
    player_name:d.name||null,handicap:d.hdcp||null,height:d.height||null,swing_speed:d.ss||null,ball_speed:d.bs||null,
    launch_angle:d.la||null,spin_rate:d.sr||null,attack_angle:d.aa||null,club_path:d.cp||null,
    smash_factor:d.smash||null,dynamic_loft:d.dl||null,
    sway_gap:d.swayGap,chest_lift:d.chestLift,lead_elbow:d.leadElbow,
    club_hand_gap:d.clubHandGap,pelvis_sway:d.pelvisSway,
    notes:d.notes||null,ai_insight:insight||null,
    recommendations:JSON.stringify({heads:recs.heads.map(function(h){return h.name;}),shafts:recs.shafts.map(function(s){return s.name;}),swayBand:recs.swayBand,validFlexes:recs.validFlexes}),
  };
  var result = await db.from('sessions').insert(row);
  if(!result.error) {
    toast('Session saved');
    var fresh = await db.from('sessions').select('*').order('created_at',{ascending:false});
    sessionsList = fresh.data || [];
  } else { toast('Could not save session','error'); }
}

// ─── SESSIONS PAGE ────────────────────────────────────────────────────────────

function renderSessions() {
  var sidebar = document.getElementById('sidebar');
  var content = document.getElementById('content');
  sidebar.innerHTML = '';
  content.innerHTML = '';

  var sec = el('div','sidebar-section');
  sec.appendChild(makeSidebarLabel('Past sessions'));
  sec.appendChild(el('div',null,sessionsList.length+' sessions saved.'));
  sidebar.appendChild(sec);

  if(!sessionsList.length) {
    var empty = el('div','empty');
    empty.innerHTML = '<i class="ti ti-history"></i><div class="empty-title">No sessions yet</div><div class="empty-sub">Sessions are saved automatically after each fitting.</div>';
    content.appendChild(empty);
    return;
  }
  var hdr = el('div'); hdr.style.marginBottom='20px';
  hdr.appendChild(el('div',null,'Fitting sessions')).style && (hdr.firstChild.style.cssText='font-size:18px;font-weight:700;margin-bottom:4px');
  hdr.appendChild(el('div',null,sessionsList.length+' sessions saved.')).style && (hdr.lastChild.style.cssText='font-size:13px;color:var(--text3)');
  content.appendChild(hdr);

  sessionsList.forEach(function(s) {
    var item = el('div','session-list-item');
    var info = el('div');
    var nameDiv = el('div','session-list-name', s.player_name||'Unnamed player');
    var metaDiv = el('div','session-list-meta', (s.swing_speed?s.swing_speed+' mph · ':'')+' Hdcp '+(s.handicap||'—')+' · '+new Date(s.created_at).toLocaleDateString());
    info.appendChild(nameDiv);
    info.appendChild(metaDiv);
    if(s.recommendations) {
      try {
        var rec = JSON.parse(s.recommendations);
        if(rec.heads && rec.heads[0]) {
          var recDiv = el('div',null,rec.heads[0]);
          recDiv.style.cssText='font-size:11px;color:var(--teal2);margin-top:3px';
          info.appendChild(recDiv);
        }
      } catch(e){}
    }
    item.appendChild(info);
    var delBtn = el('button','btn-sm danger');
    delBtn.innerHTML = '<i class="ti ti-trash"></i>';
    delBtn.addEventListener('click', function(e){ e.stopPropagation(); deleteSession(s.id); });
    item.appendChild(delBtn);
    item.addEventListener('click', function(){ loadSession(s.id); });
    content.appendChild(item);
  });
}

async function loadSession(id) {
  var session = sessionsList.find(function(s){return s.id===id;});
  if(!session) return;
  var d = {
    name:session.player_name||'',hdcp:session.handicap||'',height:session.height||'',
    ss:session.swing_speed||0,bs:session.ball_speed||0,la:session.launch_angle||0,sr:session.spin_rate||0,
    aa:session.attack_angle||0,cp:session.club_path||0,smash:session.smash_factor||0,dl:session.dynamic_loft||0,
    notes:session.notes||'',ball:'',grip:'',post:'',shotShape:'',
    swayGap:session.sway_gap,chestLift:session.chest_lift,leadElbow:session.lead_elbow,
    clubHandGap:session.club_hand_gap,pelvisSway:session.pelvis_sway,
  };
  currentSession = {data:d, recs:buildRecommendations(d)};
  document.getElementById('session-label').textContent = d.name||'Loaded session';
  showPage('results');
}

async function deleteSession(id) {
  if(!confirm('Delete this session?')) return;
  var result = await db.from('sessions').delete().eq('id',id);
  if(!result.error) { sessionsList=sessionsList.filter(function(s){return s.id!==id;}); toast('Session deleted'); renderSessions(); }
  else toast('Could not delete','error');
}

function speedToFlexes(mph) {
  var f = [];
  if(mph < 85)              f.push('R');
  if(mph >= 75 && mph < 105) f.push('S');
  if(mph >= 95 && mph < 120) f.push('X');
  if(mph >= 110)            f.push('TX');
  // Always include at least one flex
  if(!f.length) f = ['S'];
  return f;
}

function speedFlexLabel(mph) {
  var f = speedToFlexes(mph);
  return 'Valid flex: ' + f.join(' / ');
}

function speedSubLabel(mph) {
  if(mph >= 125) return 'Elite tour speed — TX primary, X secondary';
  if(mph >= 115) return 'High tour speed — TX and X both valid';
  if(mph >= 110) return 'Strong player — TX enters range alongside X';
  if(mph >= 105) return 'Better player speed — X primary, TX on the edge';
  if(mph >= 100) return 'Mid-high speed — X and S both valid';
  if(mph >= 95)  return 'Mid speed — S primary, X coming into range';
  if(mph >= 90)  return 'Mid speed — S flex range';
  if(mph >= 85)  return 'Moderate speed — S primary';
  if(mph >= 80)  return 'Lower speed — R and S both valid';
  return 'Slower swing — R flex';
}

function bandSubLabel(v) {
  if(v==='A') return 'Large sway gap (≤ -8.5") — chest well behind pelvis, upward AoA. Stiffens handle target +0.4, reduces loft target -0.5°.';
  if(v==='B') return 'Neutral sway gap (-8.5" to -6.4") — balanced attack angle. No shaft target adjustment.';
  if(v==='C') return 'Stacked sway gap (≥ -6.4") — chest over pelvis, steeper AoA. Softens handle target -0.3, adds loft target +0.4°.';
  return '';
}

function shapeSubLabel(v) {
  if(v==='Draw')     return 'Drawers avg 68.8g — weight target -1.25g';
  if(v==='Fade')     return 'Faders avg 71.3g — weight target +1.25g';
  if(v==='Straight') return 'No weight adjustment';
  return 'Select to apply weight adjustment';
}

function pelvisSubLabel(v) {
  if(v >= 6.0) return 'High forward drive — softer tip';
  if(v >= 4.5) return 'Normal range — no adjustment';
  return 'Low drive — heavier shaft tendency';
}

function elbowSubLabel(v) {
  if(v > 168) return 'Strong face closure — neutral head';
  if(v >= 158) return 'Moderate closure — neutral head';
  if(v >= 148) return 'Moderate face open — draw-bias consideration';
  return 'Chicken wing — draw-bias priority';
}

function updateShaftMapBandChips(bandChips) {
  bandChips.querySelectorAll('.chip').forEach(function(btn){
    btn.className = 'chip'+(btn.dataset.band===shaftMapBand?' selected':'');
  });
}

function getBioAdjustedTargets(profileKey) {
  var p = GRIP_POST_PROFILES[profileKey];
  if(!p) return null;
  var weight = p.weight, tip = p.tip, mid = p.mid, handle = p.handle, loft = p.loft;

  // Sway band adjustments
  if(shaftMapBand==='A') { loft -= 0.5; handle = Math.min(5, handle+0.4); }
  else if(shaftMapBand==='C') { loft += 0.4; handle = Math.max(1, handle-0.3); }

  // Pelvis sway adjustments
  if(shaftMapPelvis >= 6.0)      { tip = Math.max(1, tip-0.4); }
  else if(shaftMapPelvis < 4.5)  { weight += 1.5; }

  // Shot shape weight adjustment (based on tour data: faders 71.28g, drawers 68.81g)
  if(shaftMapShape==='Draw')     { weight -= 1.25; }
  else if(shaftMapShape==='Fade'){ weight += 1.25; }

  return {weight:weight, tip:tip, mid:mid, handle:handle, loft:loft};
}

function rescoreShaftMap() {
  var container = document.getElementById('sm-table-container');
  if(!container) return;
  container.innerHTML = '';

  var validFlexes = speedToFlexes(shaftMapSpeed);

  // Filter shafts for this speed range
  var shafts = equipmentDB.shafts.filter(function(s) {
    if(!s.tip_val || !s.mid_val || !s.handle_val) return false;
    if(s.flex && !validFlexes.includes(s.flex)) return false;
    return true;
  });

  if(!shafts.length) {
    var noData = el('div',null,'No shafts found for this speed range. Check equipment data in Admin.');
    noData.style.cssText='color:var(--text3);font-size:13px;padding:40px 0';
    container.appendChild(noData);
    return;
  }

  var legendWrap = document.getElementById('sm-legend-wrap');

  if(shaftMapProfile !== 'ALL') {
    if(legendWrap) legendWrap.style.display = 'none';
    renderShaftMapProfileList(container, shafts, shaftMapProfile);
    return;
  }
  if(legendWrap) legendWrap.style.display = '';

  var profiles = SHAFT_MAP_PROFILE_KEYS;
  var groupBreaks = [3, 6];

  // Score every shaft against bio-adjusted profile targets
  var scored = shafts.map(function(s) {
    var w  = parseFloat(s.weight)||0;
    var t  = parseFloat(s.tip_val);
    var m  = parseFloat(s.mid_val);
    var h  = parseFloat(s.handle_val);
    var tq = s.torque_val!==null ? parseFloat(s.torque_val) : null;
    var profileScores = {};
    profiles.forEach(function(key) {
      var targets = getBioAdjustedTargets(key);  // ← uses live bio controls
      var grip = key.split('|')[0];
      var torqueMap = {'On Top':2,'Side On':3,'Under':4};
      var targetTorque = torqueMap[grip]||null;
      var score = Math.abs(w-targets.weight)*0.25 + Math.abs(t-targets.tip)*2.0 + Math.abs(m-targets.mid)*3.0 + Math.abs(h-targets.handle)*1.5;
      if(targetTorque!==null && tq!==null) score += Math.abs(tq-targetTorque)*1.0;
      profileScores[key] = Math.round(score*100)/100;
    });
    var bestScore = Math.min.apply(null, Object.values(profileScores));
    return {shaft:s, scores:profileScores, bestScore:bestScore};
  });

  scored.sort(function(a,b){ return a.bestScore - b.bestScore; });
  var top20 = scored.slice(0,20);

  var profileMins = {};
  profiles.forEach(function(key) {
    profileMins[key] = Math.min.apply(null, top20.map(function(s){ return s.scores[key]; }));
  });
  var globalMax = Math.max.apply(null, top20.map(function(s){
    return Math.max.apply(null, Object.values(s.scores));
  }));

  // Build table
  var scrollWrap = el('div');
  scrollWrap.style.cssText = 'overflow-x:auto;margin-bottom:32px';

  var table = document.createElement('table');
  table.style.cssText = 'border-collapse:collapse;min-width:900px;width:100%;font-size:11px';

  var thead = document.createElement('thead');
  var headerRow = document.createElement('tr');

  var thName = el('th',null,'Shaft');
  thName.style.cssText = 'text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;border-bottom:2px solid var(--border2);white-space:nowrap;min-width:180px;position:sticky;left:0;background:var(--bg);z-index:2';
  headerRow.appendChild(thName);
  var thFlex = el('th',null,'Flex');
  thFlex.style.cssText = 'text-align:center;padding:10px 8px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;border-bottom:2px solid var(--border2);white-space:nowrap';
  headerRow.appendChild(thFlex);
  var thWt = el('th',null,'Wt');
  thWt.style.cssText = 'text-align:center;padding:10px 8px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;border-bottom:2px solid var(--border2);white-space:nowrap';
  headerRow.appendChild(thWt);

  var profileShort = {
    'On Top|Front':'P1','On Top|Center':'P2','On Top|Rear':'P3',
    'Side On|Front':'P4','Side On|Center':'P5','Side On|Rear':'P6',
    'Under|Front':'P7','Under|Center':'P8','Under|Rear':'P9',
  };

  // Grip group header row
  var gripRow = document.createElement('tr');
  var thEmpty = document.createElement('th'); thEmpty.colSpan=3;
  thEmpty.style.cssText = 'border-bottom:1px solid var(--border2)';
  gripRow.appendChild(thEmpty);
  [{label:'On Top',color:'rgba(204,0,0,0.18)'},{label:'Side On',color:'rgba(204,0,0,0.10)'},{label:'Under',color:'rgba(204,0,0,0.18)'}].forEach(function(g){
    var th = el('th',null,g.label); th.colSpan=3;
    th.style.cssText = 'text-align:center;padding:6px 4px;font-size:10px;font-weight:700;color:var(--cyan2);text-transform:uppercase;letter-spacing:0.12em;background:'+g.color+';border-bottom:1px solid var(--border2);border-left:2px solid var(--cyan3)';
    gripRow.appendChild(th);
  });
  thead.appendChild(gripRow);

  profiles.forEach(function(key,pi){
    var th = el('th',null,profileShort[key]||key);
    th.style.cssText = 'text-align:center;padding:8px 6px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;border-bottom:2px solid var(--border2);white-space:nowrap;min-width:58px'+(groupBreaks.includes(pi)?';border-left:2px solid var(--cyan3)':'');
    th.title = key;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  top20.forEach(function(item,rowIdx){
    var s = item.shaft;
    var row = document.createElement('tr');
    var rowBg = rowIdx%2===0?'var(--bg)':'var(--bg2)';
    row.style.cssText = 'border-bottom:1px solid var(--border);background:'+rowBg;

    var tdName = el('td',null,s.name);
    tdName.style.cssText = 'padding:9px 12px;font-weight:600;color:var(--text);white-space:nowrap;position:sticky;left:0;background:'+rowBg+';z-index:1';
    row.appendChild(tdName);
    var tdFlex = el('td',null,s.flex||'—');
    tdFlex.style.cssText = 'text-align:center;padding:9px 8px;color:var(--text2);font-size:11px';
    row.appendChild(tdFlex);
    var tdWt = el('td',null,(parseFloat(s.weight)||0).toFixed(0)+'g');
    tdWt.style.cssText = 'text-align:center;padding:9px 8px;color:var(--text2);font-size:11px';
    row.appendChild(tdWt);

    profiles.forEach(function(key,pi){
      var score = item.scores[key];
      var isBest = score === profileMins[key];
      var norm = Math.min(score / Math.max(globalMax,1), 1);
      var bg, textColor;
      if(isBest)       { bg='var(--cyan)'; textColor='#000'; }
      else if(norm<0.25){ bg='rgba(204,0,0,0.25)'; textColor='var(--cyan2)'; }
      else if(norm<0.5) { bg='rgba(204,0,0,0.10)'; textColor='var(--text2)'; }
      else              { bg='transparent'; textColor='var(--text3)'; }
      var td = document.createElement('td');
      td.style.cssText = 'text-align:center;padding:6px 4px;'+(groupBreaks.includes(pi)?'border-left:2px solid var(--cyan3);':'');
      var cell = el('div',null,score.toFixed(1));
      cell.style.cssText = 'background:'+bg+';color:'+textColor+';border-radius:5px;padding:4px 2px;font-size:11px;font-weight:'+(isBest?'700':'400');
      td.appendChild(cell);
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  scrollWrap.appendChild(table);
  container.appendChild(scrollWrap);
}

function renderShaftMapProfileList(container, shafts, profileKey) {
  var targets = getBioAdjustedTargets(profileKey);
  var grip = profileKey.split('|')[0];
  var torqueMap = {'On Top':2,'Side On':3,'Under':4};
  var targetTorque = torqueMap[grip]||null;

  var scored = shafts.map(function(s) {
    var w  = parseFloat(s.weight)||0;
    var t  = parseFloat(s.tip_val);
    var m  = parseFloat(s.mid_val);
    var h  = parseFloat(s.handle_val);
    var tq = s.torque_val!==null ? parseFloat(s.torque_val) : null;
    var score = Math.abs(w-targets.weight)*0.25 + Math.abs(t-targets.tip)*2.0 + Math.abs(m-targets.mid)*3.0 + Math.abs(h-targets.handle)*1.5;
    if(targetTorque!==null && tq!==null) score += Math.abs(tq-targetTorque)*1.0;
    return {shaft:s, score:Math.round(score*100)/100};
  });

  scored.sort(function(a,b){ return a.score - b.score; });
  var topN = scored.slice(0,10);
  var worstScore = scored.length ? scored[scored.length-1].score : 1;
  var bestScore = topN.length ? topN[0].score : 0;

  // Header
  var header = el('div');
  header.style.cssText = 'margin-bottom:16px';
  var headerTitle = el('div',null, SHAFT_MAP_PROFILE_SHORT[profileKey]+' — '+profileKey.replace('|',' / '));
  headerTitle.style.cssText = 'font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px';
  header.appendChild(headerTitle);
  var headerSub = el('div',null,'Top 10 shafts ranked for this profile, live-adjusted to current biomechanics inputs.');
  headerSub.style.cssText = 'font-size:12px;color:var(--text3)';
  header.appendChild(headerSub);
  container.appendChild(header);

  if(!topN.length) {
    var noData = el('div',null,'No shafts match this speed range for this profile.');
    noData.style.cssText='color:var(--text3);font-size:13px;padding:24px 0';
    container.appendChild(noData);
    return;
  }

  var list = el('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:8px;margin-bottom:32px';

  topN.forEach(function(item, idx){
    var s = item.shaft;
    var norm = Math.min((item.score - bestScore) / Math.max(worstScore - bestScore, 0.01), 1);
    var fitPct = Math.round((1-norm)*100);

    var row = el('div');
    row.style.cssText = 'display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;'+(idx===0?'border-left:3px solid var(--cyan)':'');

    var rank = el('div',null,'#'+(idx+1));
    rank.style.cssText = 'font-size:13px;font-weight:800;color:'+(idx===0?'var(--cyan)':'var(--text3)')+';min-width:28px';
    row.appendChild(rank);

    var infoWrap = el('div'); infoWrap.style.cssText = 'flex:1;min-width:0';
    var nameRow = el('div'); nameRow.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap';
    var name = el('div',null,s.name);
    name.style.cssText = 'font-size:14px;font-weight:700;color:var(--text)';
    nameRow.appendChild(name);
    var flexChip = el('span',null,s.flex||'—');
    flexChip.style.cssText = 'font-size:10px;font-weight:700;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:2px 8px';
    nameRow.appendChild(flexChip);
    infoWrap.appendChild(nameRow);

    var statsRow = el('div',null, (parseFloat(s.weight)||0).toFixed(0)+'g · Tip '+(s.tip_val!=null?parseFloat(s.tip_val).toFixed(1):'—')+' · Mid '+(s.mid_val!=null?parseFloat(s.mid_val).toFixed(1):'—')+' · Handle '+(s.handle_val!=null?parseFloat(s.handle_val).toFixed(1):'—')+(s.torque_val!=null?' · Torque '+parseFloat(s.torque_val).toFixed(1):''));
    statsRow.style.cssText = 'font-size:11px;color:var(--text3);margin-top:3px';
    infoWrap.appendChild(statsRow);
    row.appendChild(infoWrap);

    // Fit bar
    var barWrap = el('div'); barWrap.style.cssText = 'width:120px;flex-shrink:0';
    var barTrack = el('div'); barTrack.style.cssText = 'width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:4px';
    var barFill = el('div'); barFill.style.cssText = 'width:'+fitPct+'%;height:100%;background:'+(idx===0?'var(--cyan)':'#CC0000');
    barTrack.appendChild(barFill);
    barWrap.appendChild(barTrack);
    var barLabel = el('div',null,fitPct+'% fit');
    barLabel.style.cssText = 'font-size:10px;color:var(--text3);text-align:right';
    barWrap.appendChild(barLabel);
    row.appendChild(barWrap);

    var scoreVal = el('div',null,item.score.toFixed(1));
    scoreVal.style.cssText = 'font-size:15px;font-weight:800;color:'+(idx===0?'var(--cyan)':'var(--text2)')+';min-width:44px;text-align:right';
    row.appendChild(scoreVal);

    list.appendChild(row);
  });

  container.appendChild(list);
}

function buildShaftMapLegend() {
  var legend = el('div'); legend.style.cssText='margin-bottom:32px';
  var legendTitle = el('div',null,'How to read this table');
  legendTitle.style.cssText='font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text3);font-weight:700;margin-bottom:12px';
  legend.appendChild(legendTitle);
  var legendGrid = el('div');
  legendGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px';
  [{bg:'var(--cyan)',text:'#000',label:'Best fit',desc:'Top-ranked shaft for this profile. First choice to demo.'},
   {bg:'rgba(204,0,0,0.30)',text:'var(--cyan2)',label:'Score 0–3 · Strong match',desc:'Closely matches the target. Likely to feel right with minimal adjustment.'},
   {bg:'rgba(204,0,0,0.12)',text:'var(--text2)',label:'Score 3–6 · Decent match',desc:'Workable fit. May need a flex or weight tweak to dial in.'},
   {bg:'transparent',text:'var(--text3)',label:'Score 6+ · Poor fit',desc:'Profile mismatch. Not recommended for this combination.'},
  ].forEach(function(t){
    var card = el('div');
    card.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;gap:12px;align-items:flex-start';
    var swatch = el('div');
    swatch.style.cssText='width:28px;height:28px;border-radius:5px;flex-shrink:0;background:'+t.bg+';border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:1px';
    if(t.bg==='var(--cyan)') swatch.innerHTML='<i class="ti ti-star-filled" style="font-size:13px;color:#000"></i>';
    card.appendChild(swatch);
    var info = el('div');
    var lbl = el('div',null,t.label); lbl.style.cssText='font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px';
    var desc = el('div',null,t.desc); desc.style.cssText='font-size:11px;color:var(--text3);line-height:1.6';
    info.appendChild(lbl); info.appendChild(desc);
    card.appendChild(info); legendGrid.appendChild(card);
  });
  legend.appendChild(legendGrid);
  var abbr = el('div');
  abbr.style.cssText='font-size:11px;color:var(--text3);line-height:1.8;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)';
  abbr.innerHTML='<strong style="color:var(--text2)">Profile key — </strong>P1 On Top/Front &nbsp;·&nbsp; P2 On Top/Center &nbsp;·&nbsp; P3 On Top/Rear &nbsp;·&nbsp; P4 Side On/Front &nbsp;·&nbsp; P5 Side On/Center &nbsp;·&nbsp; P6 Side On/Rear &nbsp;·&nbsp; P7 Under/Front &nbsp;·&nbsp; P8 Under/Center &nbsp;·&nbsp; P9 Under/Rear &nbsp;·&nbsp; <strong style="color:var(--text2)">Scoring weights — </strong>Mid 3× &nbsp;·&nbsp; Tip 2× &nbsp;·&nbsp; Handle 1.5× &nbsp;·&nbsp; Torque 1× &nbsp;·&nbsp; Weight 0.25×';
  legend.appendChild(abbr);
  return legend;
}
